    <section class="stage" aria-label="圆柱绕流流线">
      <svg viewBox="0 0 900 760" preserveAspectRatio="xMidYMid slice" role="img" aria-label="均匀来流绕圆柱的流线图">
        <defs>
          <linearGradient id="flowA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#1769aa"/>
            <stop offset=".52" stop-color="#155eef"/>
            <stop offset="1" stop-color="#0b7f8e"/>
          </linearGradient>
          <linearGradient id="flowB" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0891b2" stop-opacity=".24"/>
            <stop offset=".5" stop-color="#2563eb" stop-opacity=".66"/>
            <stop offset="1" stop-color="#0b7f8e" stop-opacity=".22"/>
          </linearGradient>
          <radialGradient id="cyl" cx=".36" cy=".28" r=".72">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset=".58" stop-color="#e7fbf7"/>
            <stop offset="1" stop-color="#b7d8ff"/>
          </radialGradient>
          <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <marker id="edgeFlowArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse" markerUnits="strokeWidth">
            <path d="M 0 1 L 8 5 L 0 9 Z" fill="#155eef"/>
          </marker>
        </defs>
        <rect width="900" height="760" fill="transparent"/>
        <g id="edgeCylinderField" data-stream-function="psi=U*(r-a^2/r)*sin(theta)=U*y*(1-a^2/(x^2+y^2))" data-flow-components="uniform-stream+doublet" data-stream-renderer="implicit-streamfunction-bisection">
          <g id="edgeCylinderStreams"></g>
          <g class="cylinder-body">
            <circle cx="450" cy="380" r="82" fill="url(#cyl)" stroke="#d9652b" stroke-opacity=".48" stroke-width="3.5"/>
            <circle cx="450" cy="380" r="82" fill="none" stroke="#d9652b" stroke-opacity=".18" stroke-width="11"/>
          </g>
        </g>
      </svg>
      <script>
        (() => {
          const group = document.getElementById('edgeCylinderStreams');
          if (!group || group.dataset.ready === '1') return;
          group.dataset.ready = '1';
          const ns = 'http://www.w3.org/2000/svg';
          const cx = 450, cy = 380, scale = 82;
          const xMin = -6.0, xMax = 6.0;
          const psiValues = [0.18, 0.48, 0.88, 1.38, 2.00, 2.80, 3.65];
          const palette = ['url(#flowA)', '#1769aa', '#0b7f8e', 'url(#flowB)', '#2580bd', '#4ca5cf', 'url(#flowA)'];
          const solvePositiveY = (x, psiMagnitude) => {
            const residual = (y) => y * (1 - 1 / (x * x + y * y)) - psiMagnitude;
            let lower = Math.abs(x) < 1 ? Math.sqrt(1 - x * x) : 0;
            let upper = Math.max(1.5, psiMagnitude + 1.25);
            while (residual(upper) < 0) upper *= 1.5;
            for (let iteration = 0; iteration < 54; iteration += 1) {
              const middle = (lower + upper) / 2;
              if (residual(middle) < 0) lower = middle;
              else upper = middle;
            }
            return (lower + upper) / 2;
          };
          const sampledPath = (points) => {
            if (!points.length) return '';
            return points.map(([x, y], i) => `${i ? 'L' : 'M'} ${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
          };
          const pathFor = (psi, start = xMin, end = xMax, steps = 420) => {
            const points = [];
            for (let i = 0; i <= steps; i += 1) {
              const x = start + (end - start) * (i / steps);
              const y = Math.sign(psi) * solvePositiveY(x, Math.abs(psi));
              const px = cx + x * scale;
              const py = cy - y * scale;
              points.push([px, py]);
            }
            return sampledPath(points);
          };
          const makePath = (psi, index) => {
            const path = document.createElementNS(ns, 'path');
            const magnitude = Math.abs(psi);
            path.setAttribute('class', `cylinder-stream${magnitude < 1 ? ' near' : magnitude > 2.6 ? ' far' : ''}`);
            path.setAttribute('data-psi', String(psi));
            path.setAttribute('stroke', palette[index % palette.length]);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-width', magnitude < 1 ? '3.4' : magnitude > 2.6 ? '2.2' : '2.8');
            path.setAttribute('opacity', magnitude > 2.6 ? '.58' : '.84');
            path.setAttribute('vector-effect', 'non-scaling-stroke');
            path.setAttribute('shape-rendering', 'geometricPrecision');
            path.setAttribute('d', pathFor(psi));
            return path;
          };
          const makeStagnationSegment = (start, end) => {
            const path = document.createElementNS(ns, 'path');
            path.setAttribute('class', 'cylinder-stream near');
            path.setAttribute('data-psi', '0');
            path.setAttribute('stroke', '#155eef');
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-width', '3.4');
            path.setAttribute('opacity', '.88');
            path.setAttribute('vector-effect', 'non-scaling-stroke');
            path.setAttribute('d', `M ${(cx + start * scale).toFixed(1)} ${cy} L ${(cx + end * scale).toFixed(1)} ${cy}`);
            return path;
          };
          const makeDirectionCue = (psi) => {
            const path = document.createElementNS(ns, 'path');
            path.setAttribute('d', psi === 0
              ? `M ${(cx - 3.35 * scale).toFixed(1)} ${cy} L ${(cx - 2.72 * scale).toFixed(1)} ${cy}`
              : pathFor(psi, -3.35, -2.72, 18));
            path.setAttribute('stroke', '#155eef');
            path.setAttribute('stroke-width', '2.4');
            path.setAttribute('fill', 'none');
            path.setAttribute('opacity', '.82');
            path.setAttribute('marker-end', 'url(#edgeFlowArrow)');
            path.setAttribute('vector-effect', 'non-scaling-stroke');
            return path;
          };
          psiValues.forEach((psi, index) => group.appendChild(makePath(psi, index)));
          psiValues.slice().reverse().forEach((psi, index) => group.appendChild(makePath(-psi, index + 2)));
          group.appendChild(makeStagnationSegment(xMin, -1));
          group.appendChild(makeStagnationSegment(1, xMax));
          [1.38, 0.48, 0, -0.48, -1.38].forEach((psi) => group.appendChild(makeDirectionCue(psi)));
        })();
      </script>
