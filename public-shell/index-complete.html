    <section class="stage" aria-label="圆柱绕流流线">
      <svg viewBox="0 0 900 760" preserveAspectRatio="xMidYMid slice" role="img" aria-label="均匀来流绕圆柱的流线图">
        <defs>
          <linearGradient id="flowA" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0f766e"/>
            <stop offset=".52" stop-color="#155eef"/>
            <stop offset="1" stop-color="#0f766e"/>
          </linearGradient>
          <linearGradient id="flowB" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0" stop-color="#0891b2" stop-opacity=".24"/>
            <stop offset=".5" stop-color="#2563eb" stop-opacity=".66"/>
            <stop offset="1" stop-color="#0f766e" stop-opacity=".22"/>
          </linearGradient>
          <radialGradient id="cyl" cx=".36" cy=".28" r=".72">
            <stop offset="0" stop-color="#ffffff"/>
            <stop offset=".58" stop-color="#e7fbf7"/>
            <stop offset="1" stop-color="#b7d8ff"/>
          </radialGradient>
          <filter id="lineGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2.6" result="blur"/>
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
        </defs>
        <rect width="900" height="760" fill="transparent"/>
        <g id="edgeCylinderField" filter="url(#lineGlow)" data-stream-function="psi=U*(r-a^2/r)*sin(theta)=U*y*(1-a^2/(x^2+y^2))">
          <g id="edgeCylinderStreams"></g>
          <g class="cylinder-body">
            <circle cx="450" cy="380" r="82" fill="url(#cyl)" stroke="#0f766e" stroke-opacity=".34" stroke-width="3.5"/>
            <circle cx="450" cy="380" r="82" fill="none" stroke="#0f766e" stroke-opacity=".18" stroke-width="11"/>
          </g>
        </g>
      </svg>
      <script>
        (() => {
          const group = document.getElementById('edgeCylinderStreams');
          if (!group || group.dataset.ready === '1') return;
          group.dataset.ready = '1';
          const ns = 'http://www.w3.org/2000/svg';
          const cx = 450, cy = 380, scale = 82;
          const xMin = -6.0, xMax = 6.0;
          const psiValues = [0.48, 0.86, 1.26, 1.72, 2.28, 2.90, 3.55];
          const palette = ['url(#flowA)', '#2563eb', '#0f766e', 'url(#flowB)', '#0891b2', '#3b82f6', 'url(#flowA)'];
          const radiusFor = (psi, theta) => {
            const s = psi / Math.sin(theta);
            return (s + Math.sqrt(s * s + 4)) / 2;
          };
          const pathFor = (psi, sign) => {
            const points = [];
            const thetaMin = 0.018;
            const thetaMax = Math.PI - thetaMin;
            const steps = 340;
            for (let i = 0; i <= steps; i += 1) {
              const theta = thetaMax - (thetaMax - thetaMin) * (i / steps);
              const r = radiusFor(psi, theta);
              const x = r * Math.cos(theta);
              const y = sign * r * Math.sin(theta);
              if (x < xMin || x > xMax) continue;
              const px = cx + x * scale;
              const py = cy - y * scale;
              if (px >= -90 && px <= 990 && py >= -90 && py <= 850) points.push([px, py]);
            }
            return points.map(([x, y], i) => `${i ? 'L' : 'M'} ${x.toFixed(1)} ${y.toFixed(1)}`).join(' ');
          };
          const makePath = (psi, sign, index) => {
            const path = document.createElementNS(ns, 'path');
            path.setAttribute('class', `cylinder-stream${psi < 1 ? ' near' : psi > 2.6 ? ' far' : ''}`);
            path.setAttribute('data-psi', String(sign * psi));
            path.setAttribute('stroke', palette[index % palette.length]);
            path.setAttribute('fill', 'none');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-width', psi < 1 ? '5.8' : psi > 2.6 ? '3.6' : '4.6');
            path.setAttribute('opacity', psi > 2.6 ? '.66' : '.9');
            path.setAttribute('vector-effect', 'non-scaling-stroke');
            path.setAttribute('d', pathFor(psi, sign));
            return path;
          };
          psiValues.forEach((psi, index) => group.appendChild(makePath(psi, 1, index)));
          psiValues.slice().reverse().forEach((psi, index) => group.appendChild(makePath(psi, -1, index + 2)));
        })();
      </script>
