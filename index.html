    :root {

    }

    * {

    }

    body {
      margin: 0;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: max(22px, env(safe-area-inset-top)) max(18px, env(safe-area-inset-right)) max(22px, env(safe-area-inset-bottom)) max(18px, env(safe-area-inset-left));

      -webkit-font-smoothing: antialiased;

    main {
      width: min(720px, 100%);

    }

    .mark {
      width: 54px;
      height: 54px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      font-size: 24px;
      background: linear-gradient(135deg, #14b8a6, #f97316);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.38), 0 16px 36px rgba(20, 184, 166, 0.24);

    h1 {
      margin: 0;
      max-width: 12em;
      font-size: clamp(34px, 7vw, 62px);
      line-height: 1.03;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      max-width: 42em;
      color: #526173;
      font-size: clamp(16px, 2.4vw, 19px);
      line-height: 1.75;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }

    a {
      min-height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      border-radius: 999px;
      color: #ffffff;
      background: #111827;
      text-decoration: none;
      font-weight: 700;
      box-shadow: 0 10px 30px rgba(17, 24, 39, 0.16);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
      touch-action: manipulation;
    }

    a:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 38px rgba(17, 24, 39, 0.20);
    }

    a.secondary {
      color: #0f766e;
      background: rgba(15, 118, 110, 0.10);
      box-shadow: none;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #6b7280;
      font-size: 14px;
    }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #14b8a6;
      box-shadow: 0 0 0 6px rgba(20, 184, 166, 0.13);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #070d16;
        color: #f8fafc;
      }

      body {
        background:
          linear-gradient(135deg, rgba(7, 13, 22, 0.98), rgba(16, 24, 39, 0.96)),
          linear-gradient(115deg, rgba(20, 184, 166, 0.14), transparent 44%, rgba(249, 115, 22, 0.12));
      }

      main {
        background: rgba(15, 23, 42, 0.78);
        border-color: rgba(255, 255, 255, 0.12);
      }

      p,
      .status {
        color: #aab6c8;
      }

      a {
        color: #111827;
        background: #ffffff;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
      }
      body {
        animation: none;
        opacity: 1;
      }
    }

    @keyframes reveal {
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>

</html>
