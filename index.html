<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'unsafe-inline'; base-uri 'none'; frame-ancestors 'none'; form-action 'none'; object-src 'none'">
  <meta name="referrer" content="no-referrer">
  <title>安全访问入口</title>
  <style>
    :root {
      color-scheme: light dark;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fb;
      color: #152033;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(680px, 100%);
      border: 1px solid #d8e1ee;
      border-radius: 8px;
      padding: 32px;
      background: #ffffff;
      box-shadow: 0 12px 40px rgba(21, 32, 51, 0.08);
    }

    h1 {
      margin: 0 0 12px;
      font-size: clamp(26px, 5vw, 40px);
      line-height: 1.15;
    }

    p {
      margin: 0 0 18px;
      line-height: 1.75;
      color: #46566f;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 4px;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 18px;
      border-radius: 6px;
      background: #0f766e;
      color: #ffffff;
      text-decoration: none;
      font-weight: 700;
    }

    a.secondary {
      background: #e8f2f1;
      color: #0f766e;
    }

    small {
      display: block;
      margin-top: 18px;
      color: #6b778d;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        background: #101827;
        color: #eef4ff;
      }

      main {
        background: #172238;
        border-color: #2b3a56;
      }

      p,
      small {
        color: #b8c3d6;
      }
    }
  </style>
</head>
<body>
  <main>
    <h1>流体力学学习平台已进入安全访问模式</h1>
    <p>公开入口不再保存题库、课件、视频或后台资料。课程内容已经迁移到受保护站点，请使用授权账号访问。</p>
    <div class="actions">
      <a href="https://lghui-fluid-learning.pages.dev/_edge-login?next=%2Findex-complete" rel="nofollow noopener">进入安全访问入口</a>
      <a class="secondary" href="https://lghui-fluid-learning.pages.dev/_edge-reset?next=%2Findex-complete" rel="nofollow noopener">修复后进入</a>
    </div>
    <small>如果浏览器提示登录，请使用老师单独提供的访问凭据。若入口无法进入，先点“修复后进入”清理旧缓存。</small>
  </main>
</body>
</html>
