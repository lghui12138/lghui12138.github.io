<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow,noarchive">
  <meta http-equiv="cache-control" content="no-store">
  <meta http-equiv="refresh" content="2; url=https://lghui-fluid-learning.pages.dev/">
  <title>流体力学学习平台 · 安全入口</title>
  <style>
    :root { color-scheme: light dark; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; background: #f6f8fb; color: #111827; }
    main { width: min(520px, 100%); padding: 32px; border: 1px solid rgba(17,24,39,.12); border-radius: 18px; background: rgba(255,255,255,.88); box-shadow: 0 24px 70px rgba(15,23,42,.12); }
    h1 { margin: 0 0 12px; font-size: 28px; line-height: 1.18; }
    p { margin: 0 0 18px; color: #607086; line-height: 1.7; }
    a { display: inline-flex; min-height: 42px; align-items: center; border-radius: 999px; padding: 0 16px; background: #111827; color: white; font-weight: 800; text-decoration: none; }
    @media (prefers-color-scheme: dark) {
      body { background: #07111f; color: #f8fafc; }
      main { background: rgba(15,23,42,.88); border-color: rgba(255,255,255,.14); }
      p { color: #a8b3c7; }
      a { background: #f8fafc; color: #111827; }
    }
  </style>
</head>
<body>
  <main>
    <h1>正在进入安全学习平台</h1>
    <p>lghui.top 旧静态线路只保留安全跳转。完整流体力学知识点、真题和资料源位于 Cloudflare 受保护入口。</p>
    <a id="targetLink" href="https://lghui-fluid-learning.pages.dev/">进入安全入口</a>
  </main>
  <script>
    const TARGET_ORIGIN = 'https://lghui-fluid-learning.pages.dev';
    const passThrough = () => {
      const path = location.pathname === '/index.html' ? '/' : location.pathname;
      return TARGET_ORIGIN + path + location.search + location.hash;
    };
    const target = passThrough();
    document.getElementById('targetLink').href = target;
    (async () => {
      try {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(registration => registration.unregister()));
        }
        if ('caches' in window) {
          const keys = await caches.keys();
          await Promise.all(keys.map(key => caches.delete(key)));
        }
      } catch (error) {
        console.warn('旧缓存清理跳过', error);
      } finally {
        location.replace(target);
      }
    })();
  </script>
</body>
</html>
