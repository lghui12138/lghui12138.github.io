name: Deploy GitHub Pages public shell

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages-public-shell-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Stage public shell assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf _pages_public
          mkdir -p _pages_public

          rsync -a --delete public-shell/ _pages_public/
          node tools/inline-public-shell-assets.mjs \
            _pages_public/index-complete.html \
            _pages_public/gateway.html
          cp _pages_public/index-complete.html _pages_public/index.html
          cp _pages_public/gateway.html _pages_public/404.html

          routes=(
            "knowledge.html"
            "knowledge/index.html"
            "question-bank.html"
            "question-bank/index.html"
            "daily-question.html"
            "daily-question/index.html"
            "real-exams.html"
