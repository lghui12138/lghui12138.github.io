            'modules/daily-question/index.html',
            'modules/videos.html',
            'modules/videos/index.html',
            'video.html',
            'video/index.html',
            'videos.html',
            'videos/index.html',
            'course-videos.html',
            'course-videos/index.html',
            'modules/video-dynamic.html',
            'modules/video-dynamic/index.html',
            'modules/video-enhanced-module.html',
            'modules/video-enhanced-module/index.html',
            'modules/video-module.html',
            'modules/video-module/index.html',
            'modules/course-videos.html',
            'modules/course-videos/index.html',
            'modules/practice-dynamic.html',
            'modules/practice-dynamic/index.html',
            'modules/real-exams-dynamic.html',
            'modules/real-exams-dynamic/index.html',
            'modules/simulated-exams-dynamic.html',
            'modules/simulated-exams-dynamic/index.html',
            'modules/exam-dynamic.html',
            'modules/exam-dynamic/index.html',
            'resources/fluid-181103-html/index.html',
            'resources/fluid-181103-html/index/index.html',
            'resources/fluid-181103-html/materials/01-fluid-181103-01-material/index.html',
            'resources/fluid-181103-html/materials/02-fluid-181103-02-material/index.html',
            'resources/fluid-181103-html/materials/03-fluid-181103-03-material/index.html',
            'resources/fluid-181103-html/materials/04-fluid-181103-04-1-1/index.html',
            'resources/fluid-181103-html/materials/05-fluid-181103-05-1-2/index.html',
            'resources/fluid-181103-html/materials/06-fluid-181103-06-2/index.html',
            'resources/fluid-181103-html/materials/07-fluid-181103-07-2-1/index.html',
            'resources/fluid-181103-html/materials/08-fluid-181103-08-3/index.html',
            'resources/fluid-181103-html/materials/09-fluid-181103-09-2010/index.html',
            'resources/fluid-181103-html/materials/10-fluid-181103-10-2010/index.html',
            'resources/fluid-181103-html/materials/11-fluid-181103-11-i/index.html',
            'resources/fluid-181103-html/materials/12-fluid-181103-12-1-1/index.html',
            'resources/fluid-181103-html/materials/13-fluid-181103-13-1-2/index.html',
            'resources/fluid-181103-html/materials/14-fluid-181103-14-1-3/index.html',
            'resources/fluid-181103-html/materials/15-fluid-181103-15-1-4-1-5/index.html',
            'resources/fluid-181103-html/materials/16-fluid-181103-16-2/index.html',
            'resources/fluid-181103-html/materials/17-fluid-181103-17-3/index.html',
            'resources/fluid-181103-html/materials/18-fluid-181103-18-6-1-6-4/index.html',
            'resources/fluid-181103-html/materials/19-fluid-181103-19-6-5/index.html',
            'resources/fluid-181103-html/materials/20-fluid-181103-20-6-7/index.html',
            'resources/fluid-181103-html/materials/21-fluid-181103-21-8-1/index.html',
            'resources/fluid-181103-html/materials/22-fluid-181103-22-8/index.html',
            'resources/fluid-181103-html/materials/23-fluid-181103-23-material/index.html',
            'resources/fluid-181103-html/materials/24-fluid-181103-24-material/index.html',
            'resources/fluid-181103-html/materials/25-fluid-181103-25-turbulent/index.html',
            'resources/fluid-181103-html/materials/26-fluid-181103-26-ii/index.html',
            'resources/fluid-181103-html/materials/27-fluid-181103-27-0/index.html',
            'resources/fluid-181103-html/materials/28-fluid-181103-28-16-1/index.html',
            'resources/fluid-181103-html/materials/29-fluid-181103-29-3-1/index.html',
            'resources/fluid-181103-html/materials/30-fluid-181103-30-1/index.html',
            'resources/fluid-181103-html/materials/31-fluid-181103-31-turbulence14-2-ppt/index.html',
            'resources/fluid-181103-html/materials/32-fluid-181103-32-turbulence16-2-1/index.html',
            'resources/fluid-181103-html/materials/33-fluid-181103-33-turbulent14-1-1/index.html',
            'resources/fluid-181103-html/materials/34-fluid-181103-34-turbulent14-1-2/index.html',
            'resources/fluid-181103-html/materials/35-fluid-181103-35-turbulent14-1-3/index.html',
            'resources/fluid-181103-html/materials/36-fluid-181103-36-turbulent15-4-1/index.html',
            'resources/fluid-181103-html/materials/37-fluid-181103-37-turbulent16-3-1/index.html',
            'resources/fluid-181103-html/materials/38-fluid-181103-38-3-3/index.html',
            'resources/fluid-original-animations.html',
            'resources/fluid-original-animations/index.html',
            '_edge-login/index.html',
            '_edge-fast-login/index.html',
            '_edge-register/index.html',
            '_edge-forgot-password/index.html',
            '_edge-reset/index.html',
            '_edge-logout/index.html',
            '_edge-status/index.html'
          ];
          const routeMap = new Map([
            ['/knowledge.html', '/modules/knowledge-detail.html'],
            ['/knowledge', '/modules/knowledge-detail.html'],
            ['/modules/knowledge-detail', '/modules/knowledge-detail.html'],
            ['/modules/knowledge-detail.html', '/modules/knowledge-detail.html'],
            ['/question-bank.html', '/modules/question-bank.html'],
            ['/question-bank', '/modules/question-bank.html'],
            ['/modules/question-bank', '/modules/question-bank.html'],
            ['/modules/question-bank.html', '/modules/question-bank.html'],
            ['/daily-question.html', '/modules/daily-question.html'],
            ['/daily-question', '/modules/daily-question.html'],
            ['/modules/daily-question', '/modules/daily-question.html'],
            ['/modules/daily-question.html', '/modules/daily-question.html'],
            ['/modules/videos', '/modules/videos'],
            ['/modules/videos.html', '/modules/videos'],
            ['/video', '/modules/videos'],
            ['/video.html', '/modules/videos'],
            ['/videos', '/modules/videos'],
            ['/videos.html', '/modules/videos'],
            ['/course-videos', '/modules/videos'],
            ['/course-videos.html', '/modules/videos'],
            ['/modules/video-dynamic', '/modules/videos'],
            ['/modules/video-dynamic.html', '/modules/videos'],
            ['/modules/video-enhanced-module', '/modules/videos'],
            ['/modules/video-enhanced-module.html', '/modules/videos'],
            ['/modules/video-module', '/modules/videos'],
            ['/modules/video-module.html', '/modules/videos'],
            ['/modules/course-videos', '/modules/videos'],
            ['/modules/course-videos.html', '/modules/videos'],
            ['/real-exams.html', '/modules/real-exams-dynamic.html'],
            ['/real-exams', '/modules/real-exams-dynamic.html'],
            ['/modules/real-exams-dynamic', '/modules/real-exams-dynamic.html'],
            ['/modules/real-exams-dynamic.html', '/modules/real-exams-dynamic.html'],
            ['/simulated-exams.html', '/modules/simulated-exams-dynamic.html'],
            ['/simulated-exams', '/modules/simulated-exams-dynamic.html'],
            ['/modules/simulated-exams-dynamic', '/modules/simulated-exams-dynamic.html'],
            ['/modules/simulated-exams-dynamic.html', '/modules/simulated-exams-dynamic.html'],
            ['/modules/exam-dynamic', '/modules/exam-dynamic.html'],
            ['/modules/exam-dynamic.html', '/modules/exam-dynamic.html'],
            ['/practice-dynamic.html', '/modules/practice-dynamic.html'],
            ['/practice-dynamic', '/modules/practice-dynamic.html'],
            ['/modules/practice-dynamic', '/modules/practice-dynamic.html'],
            ['/modules/practice-dynamic.html', '/modules/practice-dynamic.html'],
            ['/resources.html', '/resources.html'],
            ['/resources', '/resources.html'],
            ['/_edge-login', '/_edge-login'],
            ['/_edge-fast-login', '/_edge-fast-login'],
            ['/_edge-register', '/_edge-register'],
            ['/_edge-forgot-password', '/_edge-forgot-password'],
            ['/_edge-reset', '/_edge-reset'],
            ['/_edge-logout', '/_edge-logout'],
            ['/_edge-status', '/_edge-status']
          ]);
          function publicPathForRoute(route) {
            let publicPath = `/${route}`;
            if (publicPath.endsWith('/index.html')) {
              publicPath = publicPath.slice(0, -'/index.html'.length) || '/';
            }
            return publicPath.length > 1 ? publicPath.replace(/\/+$/, '') : publicPath;
          }
          function sourcePathFor(publicPath) {
            if (routeMap.has(publicPath)) return routeMap.get(publicPath);
            if (publicPath === '/' || publicPath === '/index.html' || publicPath === '/index-complete.html' || publicPath === '/index-complete') {
              return '/_edge-fast-login';
            }
            if (publicPath.startsWith('/modules/') || publicPath.startsWith('/resources/')) return publicPath;
            return '/_edge-fast-login';
          }
          function escapedHref(publicPath) {
            const sourcePath = sourcePathFor(publicPath);
            const target = new URL(sourcePath, sourceOrigin);
            target.searchParams.set('edge_refresh', sourceRefresh);
            if ((sourcePath === '/_edge-fast-login' || sourcePath === '/_edge-login') && !target.searchParams.has('next')) {
              target.searchParams.set('next', '/index-complete?full=1');
            }
            return target.href.replace(/&/g, '&amp;');
          }
          for (const route of routes) {
            const file = path.join('_pages_public', route);
            const html = fs.readFileSync(file, 'utf8');
            const href = escapedHref(publicPathForRoute(route));
            fs.writeFileSync(
              file,
              html.replace(/href="https:\/\/lghui-fluid-learning\.pages\.dev\/_edge-fast-login\?edge_refresh=[^"]+"/, `href="${href}"`)
            );
          }
          NODE

          if find _pages_public -type f -size +95M | grep -q .; then
            find _pages_public -type f -size +95M -print
            exit 1
          fi

          du -sh _pages_public
          find _pages_public -type f | wc -l

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _pages_public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
