<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex,nofollow,noarchive" />
  <title>新版练习系统入口</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e3a8a);
      color: #fff;
    }

    .box {
      max-width: 640px;
      margin: 24px;
      padding: 28px 32px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.10);
      backdrop-filter: blur(8px);
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
      line-height: 1.7;
    }

    a {
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>新版练习系统入口</h1>
    <p>旧练习路径已迁移。为避免旧浏览器状态触发重复跳转，页面不再自动跳转；点击下方入口会保留当前查询参数和页面锚点。</p>
    <p><a id="practiceLink" data-legacy-target="./modules/practice-dynamic.html" href="/modules/practice-dynamic.html?edge_refresh=round397-server-kv-progress-cumulative-hardening-20260618">进入新版练习页</a></p>
  </div>
  <script>
    (function () {
      const link = document.getElementById('practiceLink');
      const params = new URLSearchParams(window.location.search);
      if (!params.has('edge_refresh')) params.set('edge_refresh', 'round397-server-kv-progress-cumulative-hardening-20260618');
      link.href = '/modules/practice-dynamic.html?' + params.toString() + window.location.hash;
    })();
  </script>
</body>
</html>
