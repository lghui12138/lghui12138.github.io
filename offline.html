<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#14b8a6" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#04111d" media="(prefers-color-scheme: dark)">
<link rel="icon" href="/icons/icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
  display:grid;place-items:center;min-height:100dvh;padding:2rem;
  background:#05111f;color:#e6eef9;text-align:center;
}
.card{
  max-width:480px;padding:2.5rem;border-radius:24px;
  background:#0e2239;border:1px solid rgba(168,188,209,.12);
  box-shadow:0 24px 60px rgba(0,0,0,.4);
}
.offline-icon{font-size:3rem;margin-bottom:1rem}
h1{
  font-size:1.5rem;margin-bottom:.75rem;
  background:linear-gradient(135deg,#14b8a6,#2dd4bf);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
p{color:#a8bcd1;line-height:1.6;margin-bottom:1rem}
.links{display:flex;flex-direction:column;gap:.75rem;margin-top:1.5rem}
.links a{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  padding:.75rem 1.5rem;border-radius:999px;text-decoration:none;
  font-weight:600;font-size:.95rem;transition:all 180ms ease-out;
}
.btn-primary{
  background:linear-gradient(135deg,#14b8a6,#0b6b57);color:#fff;
  box-shadow:0 4px 12px rgba(20,184,166,.3);cursor:pointer;border:none;
  font:inherit;width:100%;
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(20,184,166,.4)}
.btn-primary:disabled{opacity:.5;cursor:not-allowed;transform:none}
.btn-secondary{
  border:1px solid rgba(168,188,209,.2);color:#a8bcd1;background:none;
}
.btn-secondary:hover{border-color:#6e88a8;color:#e6eef9}
.retry-status{
  margin-top:1rem;font-size:.85rem;color:#6e88a8;min-height:1.4em;
}
</style>
</head>
<body>
<main class="card">
  <div class="offline-icon">&#127760;</div>
  <h1>无法连接到服务器</h1>
  <p>请检查您的网络连接，然后重试。<br>如果问题持续存在，请尝试刷新页面。</p>
  <div class="links">
    <button class="btn-primary" id="retryBtn" onclick="retryConnection()">&#128260; 检查网络连接</button>
    <a class="btn-secondary" href="/index-complete.html">&#127968; 返回首页</a>
  </div>
  <div class="retry-status" id="retryStatus"></div>
</main>
<script>
var retryTimer=null;
var countdown=30;

function retryConnection(){
  var btn=document.getElementById('retryBtn');
  var status=document.getElementById('retryStatus');
  btn.disabled=true;
  status.textContent='正在检查网络连接...';
  fetch('/manifest.json',{cache:'no-store',mode:'no-cors'}).then(function(){
    window.location.reload();
  }).catch(function(){
    status.textContent='网络仍不可用，将在 30 秒后自动重试...';
    countdown=30;
    if(retryTimer) clearInterval(retryTimer);
    retryTimer=setInterval(function(){
      countdown--;
      status.textContent='网络仍不可用，'+countdown+' 秒后自动重试...';
      if(countdown<=0){
        clearInterval(retryTimer);
        retryConnection();
      }
    },1000);
    btn.disabled=false;
  });
}

retryTimer=setInterval(function(){
  fetch('/manifest.json',{cache:'no-store',mode:'no-cors'}).then(function(){
    window.location.reload();
  }).catch(function(){});
},30000);
</script>
</body>
</html>
