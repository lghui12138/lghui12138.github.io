<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <style data-auth-boot>html[data-auth-pending="1"] body{visibility:hidden!important;opacity:0!important}</style>
  <script data-auth-boot>document.documentElement.setAttribute('data-auth-pending','1');</script>
  <script src="/js/security/auth-guard.js"></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#f6f8fb">
  <title>AI 学习助手 - 流体力学学习平台</title>
  <link rel="prefetch" href="/practice.html" as="document">
  <link rel="prefetch" href="/modules/knowledge-detail.html" as="document">
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f8fb;
      --surface: rgba(255, 255, 255, 0.9);
      --solid: #ffffff;
      --line: rgba(20, 31, 43, 0.11);
      --text: #14202b;
      --muted: #687684;
      --muted-2: #8b98a6;
      --blue: #0a84ff;
      --teal: #14b8a6;
      --green: #30b980;
      --orange: #f97316;
      --red: #ef4444;
      --shadow: 0 18px 44px rgba(17, 31, 45, 0.11);
      --radius: 8px;
      --radius-sm: 6px;
      --ease: cubic-bezier(.2, .8, .2, 1);
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-width: 320px;
      background: var(--bg);
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", system-ui, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 12% 10%, rgba(20, 184, 166, .15), transparent 27rem),
        radial-gradient(circle at 90% 8%, rgba(249, 115, 22, .12), transparent 23rem),
        linear-gradient(180deg, #fbfcfe 0%, #f3f7fb 44%, #eef4f8 100%);
      letter-spacing: 0;
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    textarea,
    input,
    select {
      font: inherit;
    }

    button {
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .shell {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      border-bottom: 1px solid rgba(20, 31, 43, .09);
      background: rgba(246, 248, 251, .84);
      backdrop-filter: saturate(180%) blur(22px);
    }

    .topbar-inner {
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      width: 34px;
      height: 34px;
      border-radius: var(--radius);
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--orange));
      box-shadow: 0 10px 24px rgba(20, 184, 166, .2);
      flex: 0 0 auto;
    }

    .brand-text {
      min-width: 0;
    }

    .brand-text strong {
      display: block;
      font-size: 15px;
      line-height: 1.2;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .brand-text span {
      display: block;
      margin-top: 2px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn,
    .icon-btn,
    .chip,
    .seg-btn {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .76);
      color: var(--text);
      min-height: 38px;
      padding: 0 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
      transition: transform .18s var(--ease), box-shadow .18s var(--ease), border-color .18s var(--ease), background .18s var(--ease);
    }

    .btn:hover,
    .icon-btn:hover,
    .chip:hover,
    .seg-btn:hover {
      transform: translateY(-1px);
      border-color: rgba(10, 132, 255, .28);
      box-shadow: 0 8px 22px rgba(17, 31, 45, .09);
    }

    .primary {
      border-color: rgba(10, 132, 255, .45);
      color: #fff;
      background: linear-gradient(135deg, var(--blue), var(--teal));
      box-shadow: 0 10px 22px rgba(10, 132, 255, .18);
    }

    .danger {
      color: var(--red);
      background: rgba(239, 68, 68, .08);
      border-color: rgba(239, 68, 68, .22);
    }

    .icon-btn {
      width: 38px;
      padding: 0;
      flex: 0 0 auto;
    }

    svg.icon {
      width: 18px;
      height: 18px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.1;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    main {
      padding: 22px 0 42px;
    }

    .app {
      min-height: calc(100vh - 128px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 18px;
    }

    .chat-panel,
    .side-panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .chat-panel {
      display: grid;
      grid-template-rows: auto minmax(320px, 1fr) auto;
      min-height: calc(100vh - 128px);
    }

    .chat-head {
      min-height: 72px;
      padding: 17px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(135deg, rgba(255, 255, 255, .92), rgba(237, 247, 248, .78));
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0;
    }

    .title p {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.4;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 0 6px rgba(48, 185, 128, .12);
    }

    .messages {
      padding: 18px;
      overflow-y: auto;
      scroll-behavior: smooth;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, .42), rgba(255, 255, 255, .7)),
        repeating-linear-gradient(0deg, transparent 0 31px, rgba(20,31,43,.025) 31px 32px);
    }

    .message {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr);
      gap: 11px;
      margin-bottom: 16px;
      animation: pop .2s var(--ease) both;
    }

    .message.user {
      grid-template-columns: minmax(0, 1fr) 34px;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 34px;
      height: 34px;
      border-radius: var(--radius-sm);
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      font-weight: 850;
      font-size: 13px;
      user-select: none;
    }

    .message.user .avatar {
      grid-column: 2;
      background: linear-gradient(135deg, var(--blue), var(--orange));
    }

    .bubble {
      width: fit-content;
      max-width: min(780px, 100%);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .88);
      padding: 13px 14px;
      box-shadow: 0 8px 24px rgba(17, 31, 45, .06);
      overflow-wrap: anywhere;
      line-height: 1.68;
      color: var(--text);
    }

    .message.user .bubble {
      justify-self: end;
      color: #fff;
      border-color: transparent;
      background: linear-gradient(135deg, var(--blue), #159ab0);
    }

    .bubble p {
      margin: 0 0 10px;
    }

    .bubble p:last-child {
      margin-bottom: 0;
    }

    .bubble h3 {
      margin: 10px 0 8px;
      font-size: 16px;
    }

    .bubble ul {
      margin: 8px 0;
      padding-left: 20px;
    }

    .bubble code,
    .bubble pre {
      font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    }

    .bubble code {
      padding: 2px 5px;
      border-radius: 5px;
      background: rgba(20, 31, 43, .07);
    }

    .message.user .bubble code {
      background: rgba(255, 255, 255, .18);
    }

    .math-inline,
    .math-block {
      font-family: "Times New Roman", "Cambria Math", serif;
      color: #0f766e;
    }

    .message.user .math-inline,
    .message.user .math-block {
      color: #f0fdfa;
    }

    .math-block {
      display: block;
      margin: 10px 0;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(20, 184, 166, .22);
      background: rgba(20, 184, 166, .08);
      overflow-x: auto;
      text-align: center;
    }

    .frac {
      display: inline-block;
      vertical-align: middle;
      text-align: center;
      line-height: 1.08;
      margin: 0 2px;
    }

    .frac > span {
      display: block;
      padding: 0 3px;
    }

    .frac > span:first-child {
      border-bottom: 1px solid currentColor;
    }

    .meta {
      margin-top: 6px;
      color: var(--muted-2);
      font-size: 12px;
    }

    .composer {
      padding: 14px;
      border-top: 1px solid var(--line);
      background: rgba(255, 255, 255, .9);
    }

    .composer-box {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: end;
    }

    textarea {
      width: 100%;
      min-height: 54px;
      max-height: 180px;
      resize: none;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 14px 14px;
      outline: none;
      color: var(--text);
      background: #fff;
      line-height: 1.55;
    }

    textarea:focus {
      border-color: rgba(10, 132, 255, .52);
      box-shadow: 0 0 0 4px rgba(10, 132, 255, .12);
    }

    .composer-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .side-panel {
      padding: 14px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    .side-section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .64);
      padding: 14px;
    }

    .side-title {
      margin: 0 0 10px;
      font-size: 14px;
      font-weight: 850;
      color: var(--text);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 4px;
      border-radius: var(--radius);
      background: rgba(20, 31, 43, .06);
    }

    .seg-btn {
      min-height: 34px;
      padding: 0 8px;
      border: 0;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .seg-btn.active {
      color: var(--blue);
      background: #fff;
      box-shadow: 0 6px 18px rgba(17, 31, 45, .08);
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      min-height: 32px;
      padding: 0 10px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 760;
    }

    .helper {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .thinking {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      min-height: 22px;
    }

    .thinking span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--teal);
      animation: blink 1.1s infinite ease-in-out;
    }

    .thinking span:nth-child(2) {
      animation-delay: .14s;
    }

    .thinking span:nth-child(3) {
      animation-delay: .28s;
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: .32; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-3px); }
    }

    .toast-stack {
      position: fixed;
      top: 78px;
      right: max(16px, env(safe-area-inset-right));
      width: min(360px, calc(100% - 32px));
      z-index: 60;
      display: grid;
      gap: 8px;
      pointer-events: none;
    }

    .toast {
      border: 1px solid var(--line);
      border-left: 4px solid var(--blue);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .95);
      box-shadow: 0 12px 28px rgba(17, 31, 45, .14);
      padding: 12px 14px;
      color: var(--text);
      font-size: 14px;
      transform: translateY(-8px);
      opacity: 0;
      transition: transform .2s var(--ease), opacity .2s var(--ease);
    }

    .toast.show {
      transform: translateY(0);
      opacity: 1;
    }

    .toast.error {
      border-left-color: var(--red);
    }

    .toast.success {
      border-left-color: var(--green);
    }

    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body.fullscreen main {
      padding: 0;
    }

    body.fullscreen .shell {
      width: 100%;
    }

    body.fullscreen .topbar,
    body.fullscreen .side-panel {
      display: none;
    }

    body.fullscreen .app,
    body.fullscreen .chat-panel {
      min-height: 100vh;
      border: 0;
      border-radius: 0;
      box-shadow: none;
    }

    body.fullscreen .app {
      grid-template-columns: 1fr;
    }

    @media (max-width: 940px) {
      .app {
        grid-template-columns: 1fr;
      }

      .side-panel {
        order: -1;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 640px) {
      .shell {
        width: min(100% - 20px, 1180px);
      }

      .topbar-inner {
        height: auto;
        min-height: 62px;
        padding: 10px 0;
      }

      .brand-text span,
      .nav-actions .btn span {
        display: none;
      }

      main {
        padding-top: 12px;
      }

      .app,
      .chat-panel {
        min-height: calc(100vh - 96px);
      }

      .side-panel {
        grid-template-columns: 1fr;
      }

      .chat-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .message,
      .message.user {
        grid-template-columns: 1fr;
      }

      .avatar {
        display: none;
      }

      .bubble {
        width: 100%;
      }

      .message.user .bubble {
        justify-self: stretch;
      }

      .composer-box {
        grid-template-columns: 1fr;
      }

      .composer-actions {
        justify-content: space-between;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: .01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>
<body>
  <svg class="visually-hidden" aria-hidden="true">
    <symbol id="i-home" viewBox="0 0 24 24"><path d="m3 11 9-8 9 8"/><path d="M5 10v10h14V10"/><path d="M9 20v-6h6v6"/></symbol>
    <symbol id="i-send" viewBox="0 0 24 24"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></symbol>
    <symbol id="i-trash" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 15h10l1-15"/><path d="M10 11v6"/><path d="M14 11v6"/></symbol>
    <symbol id="i-expand" viewBox="0 0 24 24"><path d="M8 3H3v5"/><path d="M16 3h5v5"/><path d="M8 21H3v-5"/><path d="M16 21h5v-5"/></symbol>
    <symbol id="i-mic" viewBox="0 0 24 24"><path d="M12 3a3 3 0 0 0-3 3v6a3 3 0 0 0 6 0V6a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><path d="M12 19v3"/></symbol>
    <symbol id="i-plus" viewBox="0 0 24 24"><path d="M12 5v14"/><path d="M5 12h14"/></symbol>
    <symbol id="i-spark" viewBox="0 0 24 24"><path d="M12 3l1.9 5.7L20 11l-6.1 2.3L12 19l-1.9-5.7L4 11l6.1-2.3z"/></symbol>
  </svg>

  <header class="topbar">
    <div class="shell topbar-inner">
      <a class="brand" href="/index-complete.html" aria-label="返回主页">
        <span class="brand-mark"><svg class="icon"><use href="#i-spark"></use></svg></span>
        <span class="brand-text">
          <strong>AI 学习助手</strong>
          <span id="userLine">边缘安全会话</span>
        </span>
      </a>
      <div class="nav-actions">
        <a class="btn" href="/index-complete.html"><svg class="icon"><use href="#i-home"></use></svg><span>主页</span></a>
        <button class="btn" id="fullBtn" type="button"><svg class="icon"><use href="#i-expand"></use></svg><span>全屏</span></button>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="app">
      <article class="chat-panel" aria-label="AI 对话">
        <div class="chat-head">
          <div class="title">
            <h1>流体力学助教</h1>
            <p>公式推导、概念辨析、解题思路，一屏内完成。</p>
          </div>
          <div class="status"><span class="status-dot"></span><span id="statusText">就绪</span></div>
        </div>

        <div class="messages" id="messages" aria-live="polite"></div>

        <form class="composer" id="composer">
          <div class="composer-box">
            <textarea id="prompt" rows="2" placeholder="输入你的问题，例如：伯努利方程适用条件是什么？"></textarea>
            <div class="composer-actions">
              <button class="icon-btn" id="voiceBtn" type="button" aria-label="语音输入"><svg class="icon"><use href="#i-mic"></use></svg></button>
              <button class="primary btn" id="sendBtn" type="submit"><svg class="icon"><use href="#i-send"></use></svg><span>发送</span></button>
            </div>
          </div>
        </form>
      </article>

      <aside class="side-panel">
        <section class="side-section">
          <h2 class="side-title">响应模式</h2>
          <div class="segmented" id="modeGroup">
            <button class="seg-btn" type="button" data-mode="fast">快速</button>
            <button class="seg-btn active" type="button" data-mode="balanced">平衡</button>
            <button class="seg-btn" type="button" data-mode="quality">深入</button>
          </div>
          <p class="helper" id="modeHint">平衡模式适合多数概念和题目讲解。</p>
        </section>

        <section class="side-section">
          <h2 class="side-title">常问问题</h2>
          <div class="chips" id="quickQuestions">
            <button class="chip" type="button">伯努利方程的适用条件</button>
            <button class="chip" type="button">雷诺数怎么判断流态</button>
            <button class="chip" type="button">边界层分离是什么</button>
            <button class="chip" type="button">水静压力合力怎么算</button>
            <button class="chip" type="button">连续方程和动量方程区别</button>
          </div>
        </section>

        <section class="side-section">
          <h2 class="side-title">公式片段</h2>
          <div class="chips" id="mathSnippets">
            <button class="chip" type="button" data-snippet="$p + \\frac{1}{2}\\rho v^2 + \\rho g z = C$">伯努利</button>
            <button class="chip" type="button" data-snippet="$Re = \\frac{\\rho v D}{\\mu}$">雷诺数</button>
            <button class="chip" type="button" data-snippet="$Q = A v$">连续方程</button>
            <button class="chip" type="button" data-snippet="$F = \\rho g h_c A$">静水压力</button>
          </div>
        </section>

        <section class="side-section">
          <h2 class="side-title">对话</h2>
          <div class="chips">
            <button class="chip" id="exportBtn" type="button">导出记录</button>
            <button class="chip danger" id="clearBtn" type="button"><svg class="icon"><use href="#i-trash"></use></svg>清空</button>
          </div>
        </section>
      </aside>
    </section>
  </main>

  <div class="toast-stack" id="toastStack" aria-live="polite" aria-atomic="true"></div>

  <script>
    (function () {
      'use strict';

      var $ = function (selector, root) { return (root || document).querySelector(selector); };
      var $$ = function (selector, root) { return Array.prototype.slice.call((root || document).querySelectorAll(selector)); };
      var state = {
        user: null,
        mode: 'balanced',
        sending: false,
        messages: []
      };

      function readJSON(key, fallback) {
        try {
          var raw = localStorage.getItem(key);
          return raw ? JSON.parse(raw) : fallback;
        } catch (error) {
          return fallback;
        }
      }

      function writeJSON(key, value) {
        try {
          localStorage.setItem(key, JSON.stringify(value));
          return true;
        } catch (error) {
          return false;
        }
      }

      function getUser() {
        if (window.FMSecurity && typeof window.FMSecurity.getUser === 'function') {
          var guarded = window.FMSecurity.getUser();
          if (guarded && guarded.username) return guarded;
        }
        var session = readJSON('fm_session_v2', null) || readJSON('fm_auth_session_v2', null);
        if (session && session.payload && session.payload.user) return session.payload.user;
        if (session && session.user) return session.user;
        return readJSON('fluidMechanicsUser', null) || { username: 'default', name: '学习者', role: 'student' };
      }

      function historyKey() {
        var name = state.user && (state.user.username || state.user.name) || 'default';
        return 'fm_ai_chat_v3_' + name;
      }

      function escapeHTML(value) {
        return String(value == null ? '' : value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function formulaHtml(source, block) {
        var text = String(source || '')
          .replace(/\\frac\{([^{}]+)\}\{([^{}]+)\}/g, '<span class="frac"><span>$1</span><span>$2</span></span>')
          .replace(/\\sqrt\{([^{}]+)\}/g, '√<span style="border-top:1px solid currentColor;padding-left:2px">$1</span>')
          .replace(/\\rho/g, 'ρ')
          .replace(/\\mu/g, 'μ')
          .replace(/\\nu/g, 'ν')
          .replace(/\\pi/g, 'π')
          .replace(/\\theta/g, 'θ')
          .replace(/\\omega/g, 'ω')
          .replace(/\\Delta/g, 'Δ')
          .replace(/\\nabla/g, '∇')
          .replace(/\\partial/g, '∂')
          .replace(/\\infty/g, '∞')
          .replace(/\\cdot/g, '·')
          .replace(/\\times/g, '×')
          .replace(/\\leq/g, '≤')
          .replace(/\\geq/g, '≥')
          .replace(/\\approx/g, '≈')
          .replace(/\\sum/g, '∑')
          .replace(/\\int/g, '∫')
          .replace(/\^\{([^{}]+)\}/g, '<sup>$1</sup>')
          .replace(/_\{([^{}]+)\}/g, '<sub>$1</sub>')
          .replace(/\^([A-Za-z0-9+-]+)/g, '<sup>$1</sup>')
          .replace(/_([A-Za-z0-9+-]+)/g, '<sub>$1</sub>');
        return block ? '<span class="math-block">' + text + '</span>' : '<span class="math-inline">' + text + '</span>';
      }

      function renderRich(text) {
        var html = escapeHTML(text || '');
        html = html.replace(/\$\$([\s\S]+?)\$\$/g, function (_, formula) { return formulaHtml(formula, true); });
        html = html.replace(/\\\[([\s\S]+?)\\\]/g, function (_, formula) { return formulaHtml(formula, true); });
        html = html.replace(/\\\(([\s\S]+?)\\\)/g, function (_, formula) { return formulaHtml(formula, false); });
        html = html.replace(/\$([^$\n]+?)\$/g, function (_, formula) { return formulaHtml(formula, false); });
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
        html = html.replace(/(<li>[\s\S]*?<\/li>)(\n<li>[\s\S]*?<\/li>)*/g, function (match) {
          return '<ul>' + match.replace(/\n/g, '') + '</ul>';
        });
        return html.split(/\n{2,}/).map(function (part) {
          if (/^\s*<(h3|ul|span class="math-block")/.test(part)) return part.replace(/\n/g, '');
          return '<p>' + part.replace(/\n/g, '<br>') + '</p>';
        }).join('');
      }

      function messageMeta(item) {
        var time = new Date(item.at || Date.now()).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
        return item.model ? time + ' · ' + item.model : time;
      }

      function renderMessages() {
        var list = $('#messages');
        list.innerHTML = state.messages.map(function (item) {
          var role = item.role === 'user' ? 'user' : 'assistant';
          var label = role === 'user' ? '我' : 'AI';
          return '<article class="message ' + (role === 'user' ? 'user' : 'ai') + '">' +
            (role === 'user' ? '' : '<div class="avatar">AI</div>') +
            '<div><div class="bubble">' + renderRich(item.content) + '</div><div class="meta">' + escapeHTML(messageMeta(item)) + '</div></div>' +
            (role === 'user' ? '<div class="avatar">' + label + '</div>' : '') +
          '</article>';
        }).join('');
        list.scrollTop = list.scrollHeight;
      }

      function saveMessages() {
        writeJSON(historyKey(), state.messages.slice(-80));
      }

      function addMessage(role, content, extra) {
        state.messages.push(Object.assign({
          role: role,
          content: content,
          at: Date.now()
        }, extra || {}));
        saveMessages();
        renderMessages();
      }

      function setSending(value) {
        state.sending = value;
        $('#sendBtn').disabled = value;
        $('#prompt').disabled = value;
        $('#statusText').innerHTML = value ? '<span class="thinking"><span></span><span></span><span></span></span>' : '就绪';
      }

      function fallbackAnswer(question) {
        var q = question.toLowerCase();
        if (q.includes('伯努利')) {
          return '伯努利方程表达的是沿同一流线的机械能守恒：$p + \\frac{1}{2}\\rho v^2 + \\rho g z = C$。\n\n常见适用条件：\n- 定常流动\n- 不可压缩流体\n- 沿同一流线\n- 黏性损失可忽略或另加水头损失项\n\n做题时先判断截面、基准面和是否需要加入损失项。';
        }
        if (q.includes('雷诺') || q.includes('re')) {
          return '雷诺数用于比较惯性力和黏性力：$Re = \\frac{\\rho v D}{\\mu}$。\n\n管流中通常 $Re < 2300$ 偏层流，$Re > 4000$ 偏湍流，中间是过渡区。判断时要注意特征长度和流体物性是否取对。';
        }
        if (q.includes('边界层')) {
          return '边界层是黏性影响集中在壁面附近的一层薄区域。壁面处速度满足无滑移条件，外缘速度逐渐接近主流速度。\n\n分离通常发生在逆压梯度较强时，近壁流体动量不足，速度梯度变小甚至反向。';
        }
        return '我先给你一个本地速答框架：\n- 先写出相关控制方程或定义式\n- 明确适用条件和物理量含义\n- 再代入题目边界条件\n- 最后检查量纲和极限情况\n\nAI 服务暂时没有返回结果，你可以换成“快速”模式再试一次。';
      }

      async function callAi(message) {
        var history = state.messages
          .filter(function (item) { return item.role === 'user' || item.role === 'assistant'; })
          .slice(-8)
          .map(function (item) { return { role: item.role, content: item.content }; });

        var response = await fetch('/api/ai', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({
            message: message,
            messages: history,
            mode: state.mode
          })
        });

        var data = await response.json().catch(function () { return {}; });
        if (!response.ok || !data.ok) {
          var error = new Error(data.error || 'ai_failed');
          error.status = response.status;
          throw error;
        }
        return data;
      }

      async function sendMessage() {
        if (state.sending) return;
        var input = $('#prompt');
        var message = input.value.trim();
        if (!message) return;

        input.value = '';
        autoSize(input);
        addMessage('user', message);
        setSending(true);

        try {
          var data = await callAi(message);
          addMessage('assistant', data.content, { model: data.model });
        } catch (error) {
          addMessage('assistant', fallbackAnswer(message), { model: '本地速答' });
          toast(error.status === 429 ? '请求太频繁，稍后再试' : 'AI 服务暂时不可用，已给出本地速答', error.status === 429 ? 'error' : '');
        } finally {
          setSending(false);
          input.focus();
        }
      }

      function autoSize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(180, Math.max(54, el.scrollHeight)) + 'px';
      }

      function setMode(mode) {
        state.mode = mode;
        $$('#modeGroup .seg-btn').forEach(function (btn) {
          btn.classList.toggle('active', btn.dataset.mode === mode);
        });
        var hints = {
          fast: '快速模式适合定义、判断和短问短答。',
          balanced: '平衡模式适合多数概念和题目讲解。',
          quality: '深入模式适合推导、证明和复杂综合题。'
        };
        $('#modeHint').textContent = hints[mode] || hints.balanced;
      }

      function insertAtCursor(textarea, text) {
        var start = textarea.selectionStart || 0;
        var end = textarea.selectionEnd || 0;
        var value = textarea.value;
        textarea.value = value.slice(0, start) + text + value.slice(end);
        textarea.selectionStart = textarea.selectionEnd = start + text.length;
        textarea.focus();
        autoSize(textarea);
      }

      function exportChat() {
        var payload = {
          user: state.user,
          messages: state.messages,
          exportedAt: new Date().toISOString()
        };
        var blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
        var url = URL.createObjectURL(blob);
        var link = document.createElement('a');
        link.href = url;
        link.download = 'ai_chat_' + (state.user.username || 'user') + '_' + new Date().toISOString().slice(0, 10) + '.json';
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        toast('对话记录已导出', 'success');
      }

      function clearChat() {
        if (!confirm('确定清空当前对话？')) return;
        state.messages = [welcomeMessage()];
        saveMessages();
        renderMessages();
        toast('对话已清空', 'success');
      }

      function welcomeMessage() {
        return {
          role: 'assistant',
          content: '你好，我是流体力学助教。你可以问我概念、公式、推导或题目思路。\n\n例如：\n- 伯努利方程什么时候不能用？\n- 雷诺数为什么能判断层流和湍流？\n- 静水压力合力怎么找作用点？',
          at: Date.now(),
          model: '本地欢迎'
        };
      }

      function setupVoice() {
        var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
          toast('当前浏览器不支持语音输入');
          return;
        }
        var recognition = new SpeechRecognition();
        recognition.lang = 'zh-CN';
        recognition.interimResults = false;
        recognition.maxAlternatives = 1;
        $('#statusText').textContent = '正在听';
        recognition.onresult = function (event) {
          var text = event.results && event.results[0] && event.results[0][0] ? event.results[0][0].transcript : '';
          if (text) insertAtCursor($('#prompt'), text);
        };
        recognition.onerror = function () { toast('语音识别没有成功', 'error'); };
        recognition.onend = function () { $('#statusText').textContent = '就绪'; };
        recognition.start();
      }

      function toast(message, type) {
        var stack = $('#toastStack');
        var node = document.createElement('div');
        node.className = 'toast ' + (type || '');
        node.textContent = message;
        stack.appendChild(node);
        requestAnimationFrame(function () { node.classList.add('show'); });
        setTimeout(function () {
          node.classList.remove('show');
          setTimeout(function () { node.remove(); }, 220);
        }, 2600);
      }

      function bindEvents() {
        $('#composer').addEventListener('submit', function (event) {
          event.preventDefault();
          sendMessage();
        });
        $('#prompt').addEventListener('input', function (event) { autoSize(event.currentTarget); });
        $('#prompt').addEventListener('keydown', function (event) {
          if (event.key === 'Enter' && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
          }
        });
        $('#modeGroup').addEventListener('click', function (event) {
          var btn = event.target.closest('[data-mode]');
          if (btn) setMode(btn.dataset.mode);
        });
        $('#quickQuestions').addEventListener('click', function (event) {
          var btn = event.target.closest('button');
          if (!btn) return;
          $('#prompt').value = btn.textContent.trim();
          autoSize($('#prompt'));
          $('#prompt').focus();
        });
        $('#mathSnippets').addEventListener('click', function (event) {
          var btn = event.target.closest('[data-snippet]');
          if (btn) insertAtCursor($('#prompt'), btn.dataset.snippet);
        });
        $('#clearBtn').addEventListener('click', clearChat);
        $('#exportBtn').addEventListener('click', exportChat);
        $('#voiceBtn').addEventListener('click', setupVoice);
        $('#fullBtn').addEventListener('click', function () {
          document.body.classList.toggle('fullscreen');
        });
      }

      function init() {
        state.user = getUser();
        $('#userLine').textContent = (state.user.name || state.user.username || '学习者') + ' · ' + (state.user.role === 'teacher' ? '教师' : '学生');
        state.messages = readJSON(historyKey(), []);
        if (!Array.isArray(state.messages) || !state.messages.length) state.messages = [welcomeMessage()];
        bindEvents();
        setMode('balanced');
        renderMessages();
      }

      window.sendMessage = sendMessage;
      window.clearChat = clearChat;

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();
  </script>
</body>
</html>
