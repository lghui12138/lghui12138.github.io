padding: 15px; border-radius: 15px; } .recommendation-title { font-size: 1.1rem; margin-bottom: 15px; } .recommendation-category { padding: 12px; border-radius: 12px; } .recommendation-category h4 { font-size: 1rem; margin-bottom: 8px; } .recommended-question { padding: 8px 12px; font-size: 0.8rem; border-radius: 8px; } .notification { margin-bottom: 8px; padding: 12px 15px; font-size: 0.85rem; border-radius: 8px; } .typing-indicator { padding: 12px; border-radius: 12px; max-width: 80%; } .typing-dot { width: 6px; height: 6px; } } /* ===== Safari浏览器适配 ===== */ @supports (-webkit-appearance: none) { .input-field { -webkit-appearance: none; border-radius: 25px; } .voice-btn, .send-btn { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .quick-btn, .recommended-question { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } /* Safari滚动条样式 */ .chat-messages::-webkit-scrollbar { width: 6px; } .chat-messages::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.1); border-radius: 3px; } .chat-messages::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 3px; } .chat-messages::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); } } /* ===== iOS Safari特殊适配 ===== */ @media screen and (-webkit-min-device-pixel-ratio: 2) { .container { -webkit-text-size-adjust: 100%; } .input-field { font-size: 16px; /* 防止iOS Safari缩放 */ } .voice-btn, .send-btn { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; } } /* ===== 横屏适配 ===== */ @media (orientation: landscape) and (max-height: 500px) { .chat-container { height: 50vh; min-height: 300px; } .quick-questions, .features-panel, .recommended-questions { display: none; } } /* ===== 大屏幕适配 ===== */ @media (min-width: 1200px) { .container { max-width: 1200px; margin: 0 auto; } .chat-container { height: 600px; } .features-panel { grid-template-columns: repeat(3, 1fr); } .recommendation-container { grid-template-columns: repeat(3, 1fr <body> <!-- 海洋背景 --> <div class="ocean-bg"> <div class="wave"></div> <div class="wave"></div> <div class="wave"></div> </div> <!-- 导航栏 --> <nav class="nav-bar"> <div class="nav-container"> <div class="nav-title">🤖 AI助手</div> <div class="nav-actions"> <a href="../index-complete.html" class="btn-nav"> <i class="fas fa-home"></i> 返回主页 </a> <button class="btn-nav" onclick="clearChat()"> <i class="fas fa-trash"></i> 清空对话 </button> </div> </div> </nav> <!-- 主内容 --> <div class="main-content"> <div class="page-header"> <h1 class="page-title">🤖 智能学习助手</h1> <p class="page-subtitle">基于AI的个性化学习指导，解答您的流体力学问题</p> </div> <!-- 聊天界面 --> <div class="chat-container"> <div class="chat-header"> <div class="chat-title">流体力学AI助手</div> <div class="chat-status" id="chatStatus">在线</div> </div> <div class="chat-messages" id="chatMessages"> <!-- 欢迎消息 --> <div class="message ai"> <div class="message-avatar">🤖</div> <div class="message-content"> <div>您好！我是您的流体力学学习助手。我可以帮助您：</div> <ul style="margin: 10px 0; padding-left: 20px;"> <li>解答流体力学相关问题</li> <li>提供学习建议和方法</li> <li>解释复杂概念和公式</li> <li>推荐学习资源</li> </ul> <div>请随时向我提问！</div> <div class="message-time">刚刚</div> </div> </div> </div> <div class="chat-input"> <div class="input-container"> <textarea class="input-field" placeholder="输入您的问题..." id="messageInput" rows="1" onkeydown="handleKeyDown(event)" ></textarea> <button class="voice-btn" onclick="startVoiceInput()" id="voiceBtn" title="语音输入"> <i class="fas fa-microphone"></i> </button> <button class="send-btn" onclick="sendMessage()" id="sendBtn"> <i class="fas fa-paper-plane"></i> </button> </div> </div> </div> <!-- 推荐问题 --> <div class="recommended-questions"> <h3 class="recommendation-title">🎯 智能推荐</h3> <div id="recommendedQuestions" class="recommendation-container"> <!-- 推荐问题将在这里动态生成 --> </div> </div> <!-- 快捷问题 --> <div class="quick-questions"> <h3 class="quick-title">💡 常见问题</h3> <div class="quick-grid"> <button class="quick-btn" onclick="askQuickQuestion('什么是伯努利方程？')"> <i class="fas fa-question <strong>非牛顿流体：</strong> 不满足牛顿内摩擦定律` } }; const messageLower = message.toLowerCase(); // 精确匹配关键词 for (const [topicKey, topic] of Object.entries(knowledgeBase)) { for (const keyword of topic.keywords) { if (messageLower.includes(keyword.toLowerCase())) { console.log(`✅ 本地知识库匹配: ${topicKey} (关键词: ${keyword})`); return topic.content + '\n\n<small style="color: #888;">📚 来源：本地知识库</small>'; } } } console.log('❌ 本地知识库无匹配结果'); // 如果没有找到特定知识点，返回null让AI处理 return null; } // 智能问题分析 function analyzeQuestion(message) { const analysis = { type: 'general', difficulty: 'medium', topics: [], requiresCalculation: false, requiresDiagram: false }; // 分析问题类型 if (message.includes('计算') || message.includes('求') || message.includes('多少')) { analysis.type = 'calculation'; analysis.requiresCalculation = true; } if (message.includes('图') || message.includes('画') || message.includes('示意')) { analysis.requiresDiagram = true; } // 识别主题 const topics = ['伯努利', '雷诺', '边界层', '层流', '湍流', '流体静力学', '压强', '速度', '流量']; analysis.topics = topics.filter(topic => message.includes(topic)); // 判断难度 if (analysis.topics.length > 2 || message.includes('复杂')) { analysis.difficulty = 'hard'; } else if (analysis.topics.length === 0) { analysis.difficulty = 'easy'; } return analysis; } // 生成计算步骤 function generateCalculationSteps(question) { const steps = []; if (question.includes('伯努利')) { steps.push( '1. 确定两个参考点', '2. 写出伯努利方程：p₁ + ½ρv₁² + ρgh₁ = p₂ + ½ρv₂² + ρgh₂', '3. 根据已知条件简化方程', '4. 求解未知量' ); } if (question.includes('雷诺数')) { steps.push( '1. 确定特征长度L', '2. 确定特征速度V', '3. 查找运动粘度ν', '4. 计算Re = VL/ν', '5. 判断流动状态' ); } return steps; } // 获取备用回复 function getFallbackResponse(message) { const fallbackResponses = { '伯努利方程': '伯努利方程是流体力学中的重要方程，描述了理想流体在定常流动中的能量守恒。公式为：p + ½ρv² + ρgh = 常数，其中p是压强，ρ是密度，v是速度，g是重力加速度，h是高度。', '雷诺数的物理意义': '雷诺数Re = VL/ν，是判断流动状态的无量纲参数。Re < 2300为层流，Re > 4000为湍流。它反映了惯性力与粘性力的比值。', '层流': '层流是流体分层流动的状态，各层之间没有明显的混合。特点是流速较小，雷诺数较低，流动稳定有序。', '湍流': '湍流是流体剧烈混合的流动状态，特点是流速较大，雷诺数较高，流动混乱无序，但传热传质效率高。', '边界层理论的基本概念': '边界层是靠近固体壁面的薄层流体，其中粘性效应显著。边界层厚度随距离的平方根增加，即δ ∝ √x。', '流体静力学的基本原理': '流体静力学研究静止流体的力学性质。主要定律包括帕斯卡定律（压强等值传递）和阿基米德定律（浮力）。' }; // 查找匹配的关键词 for (const [keyword, response] of Object.entries(fallbackResponses)) { if (message.includes(keyword)) { return response; } } // 默认回复 return '这是一个很好的问题！由于网络连接问题，我暂时无法提供详细回答。建议您查看相关教材或联系老师获取更准确的解答。'; } // 添加消息到聊天界面 function addMessageToChat(content, type, timestamp = new Date().toISOString()) { const chatMessages = document.getElementById('chatMessages'); if (!chatMessages) return; const messageDiv = document.createElement('div'); messageDiv.className = `message ${type}`; const avatar = type === 'user' ? (currentUser?.avatar || '👤') : '🤖'; const time = formatTime(timestamp); messageDiv.innerHTML = ` <div class="message-avatar">${avatar}</div> <div class="message-content"> <div>${content}</div> <div class="message-time">${time}</div> </div> `; chatMessages.appendChild(messageDiv); scrollToBottom(); // 保存到历史记录 chatHistory.push({ content: content, type: type, timestamp: timestamp }); } // 显示输入指示器 function showTypingIndicator() { if (isTyping) return; isTyping = true; const chatMessages = document.getElementById('chatMessages'); const typingDiv = document.createElement('div'); typingDiv.className = 'message ai'; typingDiv.id = 'typingIndicator'; typingDiv.innerHTML = ` <div class="message-avatar">🤖</div> <div class="typing-indicator"> <div class="typing-dot"></div> <div class="typing-dot"></div> <div class="typing-dot"></div> </div> `; chatMessages.appendChild(typingDiv); scrollToBottom(); } // 隐藏输入指示器 function hideTypingIndicator() { isTyping = false; const typingIndicator = document.getElementById('typingIndicator'); if (typingIndicator) { typingIndicator.remove(); } } // 快捷问题 function askQuickQuestion(question) { const input = document.getElementById('messageInput'); input.value = question; sendMessage(); } // 清空对话 function clearChat() { if (!confirm('确定要清空所有对话记录吗？')) return; chatHistory = []; const chatMessages = document.getElementById('chatMessages'); chatMessages.innerHTML = ` <div class="message ai"> <div class="message-avatar">🤖</div> <div class="message-content"> <div>对话已清空。有什么可以帮助您的吗？</div> <div class="message-time">刚刚</div> </div> </div> `; saveChatHistory(); showNotification('🗑️ 对话已清空', 'success'); } // 保存聊天历史 function saveChatHistory() { try { localStorage.setItem(`chat_history_${currentUser?.username || 'default'}`, JSON.stringify(chatHistory)); } catch (error) { console.error('保存聊天历史失败:', error); } } // 滚动到底部 function scrollToBottom() { const chatMessages = document.getElementById('chatMessages'); chatMessages.scrollTop = chatMessages.scrollHeight; } // 处理键盘事件 function handleKeyDown(event) { if (event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendMessage(); } } // 格式化时间 function formatTime(timestamp) { const date = new Date(timestamp); const now = new Date(); const diff = now - date; if (diff < 60000) { // 1分钟内 return '刚刚'; } else if (diff < 3600000) { // 1小时内 return `${Math.floor(diff / 60000)}分钟前`; } else if (diff < 86400000) { // 1天内 return `${Math.floor(diff / 3600000)}小时前`; } else { return date.toLocaleDateString('zh-CN'); } } // 显示通知 function showNotification(message, type = 'info', duration = 3000) { const container = document.getElementById('notification-container'); const notification = document.createElement('div'); notification.className = `notification ${type}`; notification.innerHTML = ` <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message} `; container.appendChild(notification); setTimeout(() => { notification.classList.add('show'); }, 100); if (duration > 0) { setTimeout(() => { notification.classList.remove('show'); setTimeout(() => { if (notification.parentNode) { notification.remove(); } }, 300); }, duration); } } // 语音识别功能 function initSpeechRecognition() { // 检查浏览器支持情况 if ('webkitSpeechRecognition' in window) { // Safari和Chrome支持 const recognition = new webkitSpeechRecognition(); setupSpeechRecognition(recognition); } else if ('SpeechRecognition' in window) { // 标准API支持 const recognition = new SpeechRecognition(); setupSpeechRecognition(recognition); } else { console.log('当前浏览器不支持语音识别'); // 隐藏语音按钮 const voiceBtn = document.getElementById('voiceBtn'); if (voiceBtn) { voiceBtn.style.display = 'none'; } } } // 设置语音识别 function setupSpeechRecognition(recognition) { recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'zh-CN'; recognition.onstart = function() { console.log('语音识别开始'); const voiceBtn = document.getElementById('voiceBtn'); if (voiceBtn) { voiceBtn.classList.add('recording'); voiceBtn.innerHTML = '<i class="fas fa-stop"></i>'; } }; recognition.onresult = function(event) { const transcript = event.results[0][0].transcript; document.getElementById('messageInput').value = transcript; console.log('语音识别结果:', transcript); }; recognition.onerror = function(event) { console.error('语音识别错误:', event.error); let errorMessage = '语音识别失败'; switch(event.error) { case 'no-speech': errorMessage = '没有检测到语音，请重试'; break; case 'audio-capture': errorMessage = '无法访问麦克风，请检查权限'; break; case 'not-allowed': errorMessage = '麦克风权限被拒绝'; break; case 'network': errorMessage = '网络连接错误'; break; default: errorMessage = '语音识别失败，请重试'; } showNotification(errorMessage, 'error'); stopVoiceInput(); }; recognition.onend = function() { console.log('语音识别结束'); stopVoiceInput(); }; window.speechRecognition = recognition; } // 开始语音输入 function startVoiceInput() { if (window.speechRecognition) { try { window.speechRecognition.start(); showNotification('🎤 请说话...', 'info'); } catch (error) { console.error('启动语音识别失败:', error); showNotification('语音识别启动失败', 'error'); } } else { showNotification('您的浏览器不支持语音识别', 'error'); } } // 停止语音输入 function stopVoiceInput() { if (window.speechRecognition) { try { window.speechRecognition.stop(); } catch (error) { console.error('停止语音识别失败:', error); } } const voiceBtn = document.getElementById('voiceBtn'); if (voiceBtn) { voiceBtn.classList.remove('recording'); voiceBtn.innerHTML = '<i class="fas fa-microphone"></i>'; } } // 智能推荐问题 function getRecommendedQuestions() { const recommendations = [ { category: '基础概念', questions: [ '什么是伯努利方程？', '雷诺数的物理意义是什么？', '层流和湍流的区别是什么？' ] }, { category: '计算应用', questions: [ '如何计算管道中的压力损失？', '雷诺数的计算公式是什么？', '边界层厚度如何计算？' ] }, { category: '实际应用', questions: [ '伯努利方程在航空中的应用', '流体力学在水利工程中的作用', '如何判断流动状态？' ] } ]; return recommendations; } // 显示推荐问题 function showRecommendedQuestions() { const recommendations = getRecommendedQuestions(); const container = document.getElementById('recommendedQuestions'); if (!container) return; container.innerHTML = recommendations.map(category => ` <div class="recommendation-category"> <h4>${category.category}</h4> <div class="question-list"> ${category.questions.map(question => ` <button class="recommended-question" onclick="askQuickQuestion('${question}')"> ${question} </button> `).join('')} </div> </div> `).join(''); } // 多模态回答处理 function processMultimodalResponse(response) { // 检测是否包含数学公式 const mathPattern = /\$([^$]+)\$/g; if (mathPattern.test(response)) { // 如果有MathJax，渲染数学公式 if (window.MathJax) { setTimeout(() => { MathJax.Hub.Queue(['Typeset', MathJax.Hub]); }, 100); } } // 检测是否包含代码 const codePattern = /```(\w+)?\n([\s\S]*?)```/g; if (codePattern.test(response)) { // 高亮代码块 response = response.replace(codePattern, (match, lang, code) => { return `<pre><code class="language-${lang || 'text'}">${code}</code></pre>`; }); } // 检测是否包含表格 const tablePattern = /\|(.+)\|/g; if (tablePattern.test(response)) { // 格式化表格 response = response.replace(tablePattern, (match, content) => { const cells = content.split('|').map(cell => cell.trim()); return `<tr>${cells.map(cell => `<td>${cell}</td>`).join('')}</tr>`; }); } return response; } // 智能回答增强 function enhanceAIResponse(response, question) { const analysis = analyzeQuestion(question); let enhancedResponse = response; // 如果是计算题，添加计算步骤 if (analysis.requiresCalculation) { const steps = generateCalculationSteps(question); if (steps.length > 0) { enhancedResponse += '\n\n📝 计算步骤：\n' + steps.join('\n'); } } // 添加相关练习 const relatedExercises = getRelatedExercises(analysis.topics); if (relatedExercises.length > 0) { enhancedResponse += '\n\n💡 相关练习：\n' + relatedExercises.map(ex => `- ${ex}`).join('\n'); } // 添加学习建议 const learningTips = getLearningTips(analysis.difficulty); if (learningTips) { enhancedResponse += '\n\n🎯 学习建议：\n' + learningTips; } return enhancedResponse; } // 获取相关练习 function getRelatedExercises(topics) { const exerciseMap = { '伯努利': [ '计算管道中两点的压力差', '分析文丘里管的流量测量', '计算飞机机翼的升力' ], '雷诺': [ '判断管道流动状态', '计算临界雷诺数', '分析流动稳定性' ], '边界层': [ '计算平板边界层厚度', '分析边界层分离', '计算摩擦阻力' ] }; const exercises = []; topics.forEach(topic => { if (exerciseMap[topic]) { exercises.push(...exerciseMap[topic]); } }); return exercises.slice(0, 3); } // 获取学习建议 function getLearningTips(difficulty) { const tips = { 'easy': '建议先掌握基础概念，然后进行简单计算练习。', 'medium': '建议多做典型例题，理解物理概念和数学推导。', 'hard': '建议分步骤学习，先理解各部分，再综合应用。' }; return tips[difficulty] || tips.medium; } console.log('🤖 AI助手模块已加载'); </script>
