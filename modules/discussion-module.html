<head> <style data-auth-boot> html[data-auth-pending="1"] body { visibility: hidden !important; opacity: 0 !important; } [v-cloak] { display: none !important; } </style> <script data-auth-boot>document.documentElement.setAttribute('data-auth-pending', '1');</script> <script src="/js/security/auth-guard.js"></script> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="default"> <meta name="format-detection" content="telephone=no"> <title>💬 讨论区 - 流体力学学习平台</title> <!-- Font Awesome --> <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> <style> /* ===== 海洋主题变量 ===== */ :root { --ocean-blue: #006994; --ocean-light: #4facfe; --ocean-deep: #003d5b; --coral: #ff6b6b; --seafoam: #00f2fe; --sand: #f4d03f; --wave-blue: #3498db; --bg-ocean: linear-gradient(135deg, #006994 0%, #4facfe 25%, #00f2fe 50%, #006994 75%, #003d5b 100%); --text-light: #ffffff; --text-dark: #2c3e50; } * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-ocean); background-size: 400% 400%; animation: ocean-wave 15s ease-in-out infinite; color: var(--text-light); min-height: 100vh; } @keyframes ocean-wave { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } } /* ===== 海洋背景 ===== */ .ocean-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; } .wave { position: absolute; bottom: 0; left: 0; width: 200%; height: 100px; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%2300f2fe"/><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%234facfe"/><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%23006994"/></svg>') repeat-x; animation: wave-move 20s linear infinite; } .wave:nth-child(2) { animation-delay: -5s; opacity: 0.7; } .wave:nth-child(3) { animation-delay: -10s; opacity: 0.5; } @keyframes wave-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } } /* ===== 导航栏 ===== */ .nav-bar { background: rgba(255, 255, 255, 0.95); border-bottom: 3px solid var(--ocean-light); padding: 15px 0; backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; } .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; } .nav-title { font-size: 1.5rem; font-weight: bold; color: var(--ocean-blue); } .nav-actions { display: flex; gap: 15px; } .btn-nav { background: var(--ocean-light); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; text-decoration: none; font-weight: 500; transition: all 0.3s ease; } .btn-nav:hover { background: var(--ocean-blue); transform: translateY(-2px); } /* ===== 主内容 ===== */ .main-content { max-width: 1200px; margin: 0 auto; padding: 30px 20px; } .page-header { text-align: center; margin-bottom: 40px; } .page-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 10px; background: linear-gradient(45deg, var(--ocean-light), var(--seafoam)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; } .page-subtitle { font-size: 1.1rem; opacity: 0.9; } /* ===== 发帖区域 ===== */ .post-area { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(10px); margin-bottom: 30px; } .post-header { display: flex; align-items: center; margin-bottom: 20px; } .post-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--ocean-light); display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: white; margin-right: 15px; } .post-form { flex: 1; } .post-input { width: 100%; padding: 15px; border: 2px solid #eee; border-radius: 15px; font-size: 1rem; resize: vertical; min-height: 100px; margin-bottom: 15px; transition: border-color 0.3s ease; } .post-input:focus { outline: none; border-color: var(--ocean-light); } .post-actions { display: flex; justify-content: space-between; align-items: center; } .post-category { display: flex; gap: 10px; } .category-btn { padding: 8px 15px; border: 2px solid var(--ocean-light); background: transparent; color: var(--ocean-blue); border-radius: 20px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; } .category-btn.active { background: var(--ocean-light); color: white; } .btn-post { background: var(--ocean-light); color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-weight: bold; transition: all 0.3s ease; } .btn-post:hover { background: var(--ocean-blue); transform: translateY(-2px); } /* ===== 帖子列表 ===== */ .posts-section { background: rgba(255, 255, 255, 0.95); border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1); backdrop-filter: blur(10px); } .posts-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; } .posts-title { font-size: 1.3rem; font-weight: bold; color: var(--ocean-blue); } .posts-filter { display: flex; gap: 10px; } .filter-btn { padding: 8px 15px; border: 2px solid #eee; background: white; color: #666; border-radius: 20px; cursor: pointer; transition: all 0.3s ease; font-size: 0.9rem; } .filter-btn.active { border-color: var(--ocean-light); color: var(--ocean-blue); background: rgba(79, 172, 254, 0.1); } .post-item { border-bottom: 1px solid #eee; padding: 20px 0; transition: background-color 0.3s ease; } .post-item:hover { background: rgba(79, 172, 254, 0.05); } .post-header { display: flex; align-items: flex-start; margin-bottom: 15px; } .post-user-info { flex: 1; } .post-username { font-weight: bold; color: var(--ocean-blue); margin-bottom: 5px; } .post-meta { display: flex; gap: 15px; font-size: 0.9rem; color: #666; } .post-category-tag { background: rgba(79, 172, 254, 0.1); color: var(--ocean-blue); padding: 4px 8px; border-radius: 10px; font-size: 0.8rem; } .post-content { color: var(--text-dark); line-height: 1.6; margin-bottom: 15px; } .post-actions { display: flex; gap: 20px; align-items: center; } .action-btn { display: flex; align-items: center; gap: 5px; background: none; border: none; color: #666; cursor: pointer; padding: 8px 12px; border-radius: 15px; transition: all 0.3s ease; font-size: 0.9rem; } .action-btn:hover { background: rgba(79, 172, 254, 0.1); color: var(--ocean-blue); } .action-btn.liked { color: #e74c3c; } /* ===== 回复区域 ===== */ .replies-section { margin-top: 15px; padding-left: 20px; border-left: 3px solid #eee; } .reply-item { padding: 15px 0; border-bottom: 1px solid #f0f0f0; } .reply-header { display: flex; align-items: center; margin-bottom: 10px; } .reply-avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--seafoam); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: white; margin-right: 10px; } .reply-username { font-weight: bold; color: var(--ocean-blue); margin-right: 10px; } .reply-time { color: #999; font-size: 0.8rem; } .reply-content { color: var(--text-dark); line-height: 1.5; } .reply-form { margin-top: 15px; display: none; } .reply-input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.9rem; resize: vertical; min-height: 60px; margin-bottom: 10px; } .reply-input:focus { outline: none; border-color: var(--ocean-light); } .btn-reply { background: var(--ocean-light); color: white; border: none; padding: 8px 15px; border-radius: 15px; cursor: pointer; font-size: 0.9rem; } .btn-reply:hover { background: var(--ocean-blue); } /* ===== 响应式设计 ===== */ @media (max-width: 768px) { .post-actions { flex-direction: column; gap: 10px; } .posts-filter { flex-wrap: wrap; } .page-title { font-size: 2rem; } } /* ===== 通知样式 ===== */ .notification-container { position: fixed; top: 20px; right: 20px; z-index: 1000; } .notification { background: white; border-radius: 10px; padding: 15px 20px; margin-bottom: 10px; box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2); border-left: 4px solid var(--ocean-light); transform: translateX(100%); transition: transform 0.3s ease; } .notification.show { transform: translateX(0); } .notification.success { border-color: #27ae60; } .notification.error { border-color: #e74c3c; } .notification.warning { border-color: #f39c12; } /* ===== 移动端适配 ===== */ @media (max-width: 768px) { .container { padding: 10px; margin: 0; } .page-title { font-size: 1.5rem; margin-bottom: 15px; } .post-area { padding: 15px; border-radius: 15px; } .post-header { flex-direction: column; gap: 15px; } .post-avatar { width: 40px; height: 40px; font-size: 1.2rem; } .post-form { width: 100%; } .post-input { min-height: 80px; font-size: 0.9rem; padding: 12px; } .post-actions { flex-direction: column; gap: 10px; } .post-category { flex-wrap: wrap; gap: 8px; } .category-btn { padding: 8px 12px; font-size: 0.8rem; } .btn-post { padding: 10px 20px; font-size: 0.9rem; } .posts-section { padding: 15px; border-radius: 15px; } .posts-header { flex-direction: column; gap: 15px; } .posts-title { font-size: 1.2rem; margin-bottom: 0; } .posts-filter { flex-wrap: wrap; gap: 8px; } .filter-btn { padding: 6px 12px; font-size: 0.8rem; } .post-card { padding: 15px; border-radius: 12px; } .post-header-info h4 { font-size: 1rem; margin-bottom: 4px; } .post-meta { font-size: 0.8rem; gap: 8px; } .post-content { font-size: 0.9rem; line-height: 1.4; margin: 10px 0; } .post-actions { flex-direction: column; gap: 8px; } .action-btn { padding: 6px 10px; font-size: 0.8rem; } .comments-section { margin-top: 10px; } .comment { padding: 10px; border-radius: 8px; } .comment-header h5 { font-size: 0.9rem; margin-bottom: 4px; } .comment-content { font-size: 0.85rem; line-height: 1.3; } .comment-actions { gap: 6px; margin-top: 8px; } .comment-btn { padding: 4px 8px; font-size: 0.75rem; } .reply-form { padding: 10px; border-radius: 8px; } .reply-input { min-height: 60px; font-size: 0.85rem; padding: 8px; } .reply-actions { gap: 8px; margin-top: 8px; } .reply-btn { padding: 6px 12px; font-size: 0.8rem; } } /* ===== Safari浏览器适配 ===== */ @supports (-webkit-appearance: none) { .post-card, .comment { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .category-btn, .filter-btn, .action-btn, .comment-btn, .reply-btn { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .post-input, .reply-input { -webkit-overflow-scrolling: touch; } } /* ===== iOS Safari特殊适配 ===== */ @media screen and (-webkit-min-device-pixel-ratio: 2) { .container { -webkit-text-size-adjust: 100%; } .post-input, .reply-input { font-size: 16px; /* 防止iOS Safari缩放 */ } .category-btn, .filter-btn, .action-btn, .comment-btn, .reply-btn { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; } } /* ===== 触摸设备优化 ===== */ @media (hover: none) and (pointer: coarse) { .post-card:hover, .comment:hover, .category-btn:hover, .filter-btn:hover, .action-btn:hover, .comment-btn:hover, .reply-btn:hover { transform: none; } .post-card:active, .comment:active, .category-btn:active, .filter-btn:active, .action-btn:active, .comment-btn:active, .reply-btn:active { transform: scale(0.95); } } /* ===== 讨论区增强功能 ===== */ .post-stats { display: flex; gap: 15px; margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255, 255, 255, 0.1); } .stat-item { display: flex; align-items: center; gap: 5px; font-size: 0.85rem; color: rgba(255, 255, 255, 0.7); } .stat-item i { font-size: 0.8rem; } .post-tags { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; } .post-tag { background: rgba(79, 172, 254, 0.2); color: var(--ocean-light); padding: 4px 8px; border-radius: 12px; font-size: 0.75rem; } .post-pinned { background: linear-gradient(135deg, #f39c12 0%, #e67e22 100%); border-left: 4px solid #f39c12; } .post-featured { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); border-left: 4px solid #e74c3c; } </style>

<body> <!-- 海洋背景 --> <div class="ocean-bg"> <div class="wave"></div> <div class="wave"></div> <div class="wave"></div> </div> <!-- 导航栏 --> <nav class="nav-bar"> <div class="nav-container"> <div class="nav-title">💬 讨论区</div> <div class="nav-actions"> <a href="../index-complete.html" class="btn-nav"> <i class="fas fa-home"></i> 返回主页 </a> <button class="btn-nav" onclick="refreshPosts()"> <i class="fas fa-sync-alt"></i> 刷新 </button> </div> </div> </nav> <!-- 主内容 --> <div class="main-content"> <div class="page-header"> <h1 class="page-title">💬 学习讨论区</h1> <p class="page-subtitle">与同学们交流学习心得，分享解题思路</p> </div> <!-- 发帖区域 --> <div class="post-area"> <div class="post-header"> <div class="post-avatar" id="userAvatar">👤</div> <div class="post-form"> <textarea class="post-input" placeholder="分享您的学习心得或提出问题..." id="postContent"></textarea> <div class="post-actions"> <div class="post-category"> <button class="category-btn active" data-category="general">💬 一般讨论</button> <button class="category-btn" data-category="question">❓ 问题求助</button> <button class="category-btn" data-category="share">📚 学习分享</button> <button class="category-btn" data-category="resource">🔗 资源推荐</button> </div> <button class="btn-post" onclick="createPost()"> <i class="fas fa-paper-plane"></i> 发布 </button> </div> </div> </div> </div> <!-- 帖子列表 --> <div class="posts-section"> <div class="posts-header"> <h3 class="posts-title">最新讨论</h3> <div class="posts-filter"> <button class="filter-btn active" data-filter="all">全部</button> <button class="filter-btn" data-filter="general">一般讨论</button> <button class="filter-btn" data-filter="question">问题求助</button> <button class="filter-btn" data-filter="share">学习分享</button> <button class="filter-btn" data-filter="resource">资源推荐</button> </div> </div> <div id="postsList"> <!-- 帖子将通过JavaScript动态生成 --> </div> </div> </div> <!-- 通知容器 --> <div id="notification-container"></div> <script> // 全局变量 let posts = []; let currentUser = null; let currentCategory = 'general'; let currentFilter = 'all'; // 页面初始化 document.addEventListener('DOMContentLoaded', function() { loadUserData(); loadPosts(); setupEventListeners(); showNotification('💬 讨论区模块已加载', 'success'); }); // 加载用户数据 function loadUserData() { try { currentUser = JSON.parse(localStorage.getItem('currentUser')); if (currentUser) { document.getElementById('userAvatar').textContent = currentUser.avatar; } } catch (error) { console.error('加载用户数据失败:', error); } } // 设置事件监听器 function setupEventListeners() { // 分类选择 document.querySelectorAll('.category-btn').forEach(btn => { btn.addEventListener('click', function() { document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentCategory = this.dataset.category; }); }); // 过滤器 document.querySelectorAll('.filter-btn').forEach(btn => { btn.addEventListener('click', function() { document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); this.classList.add('active'); currentFilter = this.dataset.filter; renderPosts(); }); }); } // 加载帖子 function loadPosts() { try { const savedPosts = localStorage.getItem('discussion_posts'); if (savedPosts) { posts = JSON.parse(savedPosts); } else { // 讨论区初始为空 posts = []; } renderPosts(); } catch (error) { console.error('加载帖子失败:', error); } } // 渲染帖子 function renderPosts() { const postsList = document.getElementById('postsList'); if (!postsList) return; let filteredPosts = posts; // 应用过滤器 if (currentFilter !== 'all') { filteredPosts = posts.filter(post => post.category === currentFilter); } // 按时间排序 filteredPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt)); if (filteredPosts.length === 0) { postsList.innerHTML = ` <div style="text-align: center; padding: 50px; color: #666;"> <i class="fas fa-comments" style="font-size: 3rem; margin-bottom: 20px; opacity: 0.5;"></i> <p>暂无讨论内容</p> <p>快来发布第一个讨论吧！</p> </div> `; return; } postsList.innerHTML = filteredPosts.map(post => ` <div class="post-item"> <div class="post-header"> <div class="post-avatar">${post.avatar}</div> <div class="post-user-info"> <div class="post-username">${post.authorName}</div> <div class="post-meta"> <span>${formatDate(post.createdAt)}</span> <span class="post-category-tag">${getCategoryName(post.category)}</span> </div> </div> </div> <div class="post-content">${post.content}</div> <div class="post-actions"> <button class="action-btn ${post.likedBy.includes(currentUser?.username || '') ? 'liked' : ''}" onclick="toggleLike(${post.id})"> <i class="fas fa-heart"></i> <span>${post.likes}</span> </button> <button class="action-btn" onclick="toggleReplyForm(${post.id})"> <i class="fas fa-reply"></i> <span>回复</span> </button> <button class="action-btn" onclick="toggleReplies(${post.id})"> <i class="fas fa-comments"></i> <span>${post.replies.length} 条回复</span> </button> </div> <!-- 回复区域 --> <div class="replies-section" id="replies-${post.id}" style="display: none;"> ${post.replies.map(reply => ` <div class="reply-item"> <div class="reply-header"> <div class="reply-avatar">${reply.avatar}</div> <div class="reply-username">${reply.authorName}</div> <div class="reply-time">${formatDate(reply.createdAt)}</div> </div> <div class="reply-content">${reply.content}</div> </div> `).join('')} <!-- 回复表单 --> <div class="reply-form" id="reply-form-${post.id}"> <textarea class="reply-input" placeholder="写下您的回复..." id="reply-content-${post.id}"></textarea> <button class="btn-reply" onclick="addReply(${post.id})">回复</button> </div> </div> </div> `).join(''); } // 创建帖子 function createPost() { if (!currentUser) { showNotification('请先登录', 'error'); return; } const content = document.getElementById('postContent').value.trim(); if (!content) { showNotification('请输入帖子内容', 'error'); return; } const newPost = { id: Date.now(), author: currentUser.username, authorName: currentUser.name, avatar: currentUser.avatar, content: content, category: currentCategory, likes: 0, replies: [], createdAt: new Date().toISOString(), likedBy: [] }; posts.unshift(newPost); savePosts(); renderPosts(); // 清空输入框 document.getElementById('postContent').value = ''; showNotification('✅ 帖子发布成功', 'success'); } // 切换点赞 function toggleLike(postId) { if (!currentUser) { showNotification('请先登录', 'error'); return; } const post = posts.find(p => p.id === postId); if (!post) return; const username = currentUser.username; const likedIndex = post.likedBy.indexOf(username); if (likedIndex > -1) { post.likedBy.splice(likedIndex, 1); post.likes--; } else { post.likedBy.push(username); post.likes++; } savePosts(); renderPosts(); } // 切换回复表单显示 function toggleReplyForm(postId) { if (!currentUser) { showNotification('请先登录', 'error'); return; } const replyForm = document.getElementById(`reply-form-${postId}`); if (replyForm) { replyForm.style.display = replyForm.style.display === 'block' ? 'none' : 'block'; } } // 切换回复列表显示 function toggleReplies(postId) { const repliesSection = document.getElementById(`replies-${postId}`); if (repliesSection) { repliesSection.style.display = repliesSection.style.display === 'block' ? 'none' : 'block'; } } // 添加回复 function addReply(postId) { if (!currentUser) { showNotification('请先登录', 'error'); return; } const content = document.getElementById(`reply-content-${postId}`).value.trim(); if (!content) { showNotification('请输入回复内容', 'error'); return; } const post = posts.find(p => p.id === postId); if (!post) return; const newReply = { id: Date.now(), author: currentUser.username, authorName: currentUser.name, avatar: currentUser.avatar, content: content, createdAt: new Date().toISOString() }; post.replies.push(newReply); savePosts(); renderPosts(); // 清空输入框 document.getElementById(`reply-content-${postId}`).value = ''; showNotification('✅ 回复发布成功', 'success'); } // 刷新帖子 function refreshPosts() { loadPosts(); showNotification('🔄 讨论区已刷新', 'success'); } // 保存帖子到本地存储 function savePosts() { try { localStorage.setItem('discussion_posts', JSON.stringify(posts)); } catch (error) { console.error('保存帖子失败:', error); } } // 工具函数 function getCategoryName(category) { const names = { 'general': '一般讨论', 'question': '问题求助', 'share': '学习分享', 'resource': '资源推荐' }; return names[category] || '其他'; } function formatDate(dateString) { const date = new Date(dateString); const now = new Date(); const diff = now - date; if (diff < 60000) { // 1分钟内 return '刚刚'; } else if (diff < 3600000) { // 1小时内 return `${Math.floor(diff / 60000)}分钟前`; } else if (diff < 86400000) { // 1天内 return `${Math.floor(diff / 3600000)}小时前`; } else { return date.toLocaleDateString('zh-CN'); } } // 显示通知 function showNotification(message, type = 'info', duration = 3000) { const container = document.getElementById('notification-container'); const notification = document.createElement('div'); notification.className = `notification ${type}`; notification.innerHTML = ` <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message} `; container.appendChild(notification); setTimeout(() => { notification.classList.add('show'); }, 100); if (duration > 0) { setTimeout(() => { notification.classList.remove('show'); setTimeout(() => { if (notification.parentNode) { notification.remove(); } }, 300); }, duration); } } // 搜索帖子功能 function searchPosts() { const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim(); if (!searchTerm) { renderPosts(); return; } const filteredPosts = posts.filter(post => post.title.toLowerCase().includes(searchTerm) || post.content.toLowerCase().includes(searchTerm) || post.authorName.toLowerCase().includes(searchTerm) ); renderFilteredPosts(filteredPosts); } // 渲染搜索结果 function renderFilteredPosts(filteredPosts) { const postsContainer = document.getElementById('postsContainer'); if (filteredPosts.length === 0) { postsContainer.innerHTML = ` <div class="no-results"> <i class="fas fa-search"></i> <h3>未找到相关帖子</h3> <p>请尝试其他关键词</p> </div> `; return; } postsContainer.innerHTML = filteredPosts.map(post => createPostHTML(post)).join(''); } // 置顶帖子功能 function togglePinPost(postId) { if (!currentUser || currentUser.role !== 'teacher') { showNotification('只有教师可以置顶帖子', 'error'); return; } const post = posts.find(p => p.id === postId); if (post) { post.pinned = !post.pinned; savePosts(); renderPosts(); showNotification(post.pinned ? '帖子已置顶' : '帖子已取消置顶', 'success'); } } // 设置精华帖子 function toggleFeaturedPost(postId) { if (!currentUser || currentUser.role !== 'teacher') { showNotification('只有教师可以设置精华帖子', 'error'); return; } const post = posts.find(p => p.id === postId); if (post) { post.featured = !post.featured; savePosts(); renderPosts(); showNotification(post.featured ? '帖子已设为精华' : '帖子已取消精华', 'success'); } } // 举报帖子 function reportPost(postId) { if (!currentUser) { showNotification('请先登录', 'error'); return; } const reportReasons = [ '垃圾信息', '不当内容', '恶意攻击', '重复发布', '其他' ]; const modal = document.createElement('div'); modal.className = 'report-modal'; modal.innerHTML = ` <div class="report-content"> <div class="report-header"> <h3>举报帖子</h3> <button onclick="this.closest('.report-modal').remove()" class="close-btn">&times;</button> </div> <div class="report-body"> <p>请选择举报原因：</p> <div class="report-reasons"> ${reportReasons.map(reason => ` <label class="report-reason"> <input type="radio" name="reportReason" value="${reason}"> <span>${reason}</span> </label> `).join('')} </div> <div class="form-group"> <label>详细说明（可选）：</label> <textarea id="reportDetail" placeholder="请详细描述举报原因..."></textarea> </div> </div> <div class="report-footer"> <button onclick="this.closest('.report-modal').remove()" class="btn-secondary">取消</button> <button onclick="submitReport(${postId})" class="btn-primary">提交举报</button> </div> </div> `; document.body.appendChild(modal); } // 提交举报 function submitReport(postId) { const reason = document.querySelector('input[name="reportReason"]:checked'); const detail = document.getElementById('reportDetail').value; if (!reason) { showNotification('请选择举报原因', 'error'); return; } const report = { postId: postId, reporter: currentUser.username, reason: reason.value, detail: detail, timestamp: new Date().toISOString() }; // 保存举报记录 const reports = JSON.parse(localStorage.getItem('discussion_reports') || '[]'); reports.push(report); localStorage.setItem('discussion_reports', JSON.stringify(reports)); document.querySelector('.report-modal').remove(); showNotification('举报已提交，我们会尽快处理', 'success'); } // 用户等级系统 function getUserLevel(username) { const userPosts = posts.filter(p => p.author === username); const totalPosts = userPosts.length; const totalLikes = userPosts.reduce((sum, post) => sum + post.likes, 0); if (totalPosts >= 50 && totalLikes >= 100) return { level: '专家', color: '#e74c3c' }; if (totalPosts >= 20 && totalLikes >= 50) return { level: '活跃用户', color: '#f39c12' }; if (totalPosts >= 10 && totalLikes >= 20) return { level: '常客', color: '#27ae60' }; if (totalPosts >= 5) return { level: '新手', color: '#3498db' }; return { level: '游客', color: '#95a5a6' }; } // 帖子排序功能 function sortPosts(criteria) { const sortFunctions = { 'latest': (a, b) => new Date(b.createdAt) - new Date(a.createdAt), 'popular': (a, b) => (b.likes + b.replies.length) - (a.likes + a.replies.length), 'mostReplies': (a, b) => b.replies.length - a.replies.length, 'mostLikes': (a, b) => b.likes - a.likes }; const sortedPosts = [...posts].sort(sortFunctions[criteria]); renderFilteredPosts(sortedPosts); // 更新排序按钮状态 document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active')); document.querySelector(`[data-sort="${criteria}"]`).classList.add('active'); } // 帖子统计功能 function updatePostStats() { const stats = { totalPosts: posts.length, totalReplies: posts.reduce((sum, post) => sum + post.replies.length, 0), totalLikes: posts.reduce((sum, post) => sum + post.likes, 0), activeUsers: new Set(posts.map(p => p.author)).size }; const statsContainer = document.getElementById('postStats'); if (statsContainer) { statsContainer.innerHTML = ` <div class="stat-item"> <i class="fas fa-file-alt"></i> <span>${stats.totalPosts} 个帖子</span> </div> <div class="stat-item"> <i class="fas fa-comments"></i> <span>${stats.totalReplies} 条回复</span> </div> <div class="stat-item"> <i class="fas fa-heart"></i> <span>${stats.totalLikes} 个点赞</span> </div> <div class="stat-item"> <i class="fas fa-users"></i> <span>${stats.activeUsers} 位活跃用户</span> </div> `; } } console.log('💬 讨论区模块已加载'); </script>
