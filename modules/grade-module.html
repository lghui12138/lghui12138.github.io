<head> <style data-auth-boot> html[data-auth-pending="1"] body { visibility: hidden !important; opacity: 0 !important; } [v-cloak] { display: none !important; } </style> <script data-auth-boot>document.documentElement.setAttribute('data-auth-pending', '1');</script> <script src="/js/security/auth-guard.js"></script> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="default"> <meta name="format-detection" content="telephone=no"> <title>📊 成绩管理 - 流体力学学习平台</title> <!-- Font Awesome - 使用国内CDN --> <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> <!-- Chart.js - 使用国内CDN --> <script src="https://cdn.bootcdn.net/ajax/libs/Chart.js/3.9.1/chart.min.js"></script> <style> /* ===== 海洋主题变量 ===== */ :root { --ocean-blue: #006994; --ocean-light: #4facfe; --ocean-deep: #003d5b; --coral: #ff6b6b; --seafoam: #00f2fe; --sand: #f4d03f; --wave-blue: #3498db; --bg-ocean: linear-gradient(135deg, #006994 0%, #4facfe 25%, #00f2fe 50%, #006994 75%, #003d5b 100%); --text-light: #ffffff; --text-dark: #2c3e50; } * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-ocean); background-size: 400% 400%; animation: ocean-wave 15s ease-in-out infinite; color: var(--text-light); min-height: 100vh; } @keyframes ocean-wave { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } } /* ===== 海洋背景 ===== */ .ocean-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; } .wave { position: absolute; bottom: 0; left: 0; width: 200%; height: 100px; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%2300f2fe"/><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%234facfe"/><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%23006994"/></svg>') repeat-x; animation: wave-move 20s linear infinite; } .wave:nth-child(2) { animation-delay: -5s; opacity: 0.7; } .wave:nth-child(3) { animation-delay: -10s; opacity: 0.5; } @keyframes wave-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } } /* ===== 导航栏 ===== */ .nav-bar { background: rgba(255, 255, 255, 0.95); border-bottom: 3px solid var(--ocean-light); padding: 15px 0; backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; } .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; } .nav-brand { display: flex; align-items: center; gap: 15px; font-size: 1.5rem; font-weight: bold; color: var(--ocean-blue); text-decoration: none; } .nav-brand i { font-size: 2rem; animation: ocean-pulse 2s ease-in-out infinite; } @keyframes ocean-pulse { 0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px var(--ocean-light)); } 50% { transform: scale(1.1); filter: drop-shadow(0 0 20px var(--seafoam)); } } .btn-back { background: linear-gradient(45deg, var(--ocean-light), var(--seafoam)); color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; transition: all 0.3s ease; font-weight: 600; text-decoration: none; display: inline-flex; align-items: center; gap: 8px; } .btn-back:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); } /* ===== 主内容 ===== */ .main-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; } .page-header { text-align: center; margin-bottom: 40px; } .page-title { font-size: 2.5rem; margin-bottom: 10px; color: var(--text-light); } .page-subtitle { font-size: 1.2rem; color: rgba(255, 255, 255, 0.8); } /* ===== 统计卡片 ===== */ .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; } .stat-card { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; padding: 25px; text-align: center; color: var(--text-dark); transition: all 0.3s ease; } .stat-card:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); border-color: var(--coral); } .stat-icon { font-size: 2.5rem; margin-bottom: 15px; color: var(--ocean-blue); } .stat-value { font-size: 2rem; font-weight: bold; margin-bottom: 5px; color: var(--ocean-blue); } .stat-label { font-size: 1rem; color: var(--text-dark); } /* ===== 成绩录入区域 ===== */ .grade-input-section { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; padding: 30px; margin-bottom: 40px; color: var(--text-dark); } .section-title { font-size: 1.5rem; color: var(--ocean-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; } .input-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; } .form-group { display: flex; flex-direction: column; } .form-label { margin-bottom: 8px; color: var(--ocean-deep); font-weight: 600; } .form-input { padding: 12px 15px; border: 2px solid var(--ocean-light); border-radius: 10px; font-size: 16px; transition: all 0.3s ease; } .form-input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 15px rgba(255, 107, 107, 0.3); } .btn-add { background: linear-gradient(45deg, var(--ocean-light), var(--seafoam)); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; align-self: end; } .btn-add:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); } /* ===== 成绩列表 ===== */ .grade-list-section { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; padding: 30px; margin-bottom: 40px; color: var(--text-dark); } .grade-table { width: 100%; border-collapse: collapse; margin-top: 20px; } .grade-table th, .grade-table td { padding: 15px; text-align: left; border-bottom: 1px solid var(--ocean-light); } .grade-table th { background: var(--ocean-light); color: white; font-weight: 600; } .grade-table tr:hover { background: rgba(79, 172, 254, 0.1); } .grade-score { font-weight: bold; color: var(--ocean-blue); } .grade-actions { display: flex; gap: 10px; } .btn-edit, .btn-delete { padding: 8px 12px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: all 0.3s ease; } .btn-edit { background: var(--seafoam); color: white; } .btn-delete { background: var(--coral); color: white; } .btn-edit:hover, .btn-delete:hover { transform: scale(1.05); } /* ===== 图表区域 ===== */ .chart-section { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; padding: 30px; margin-bottom: 40px; color: var(--text-dark); } .chart-container { height: 400px; margin-top: 20px; display: flex; align-items: center; justify-content: center; background: rgba(240, 244, 248, 0.5); border-radius: 15px; border: 2px dashed var(--ocean-light); } .chart-placeholder { text-align: center; color: var(--ocean-blue); } .chart-placeholder i { font-size: 3rem; margin-bottom: 15px; } /* ===== 通知系统 ===== */ .notification { position: fixed; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.95); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 20px; color: var(--text-dark); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); transform: translateX(100%); transition: transform 0.3s ease; z-index: 1000; max-width: 350px; } .notification.show { transform: translateX(0); } .notification.success { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); } .notification.error { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); } /* ===== 详细分析 ===== */ .analysis-section { margin-top: 40px; padding: 30px; background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; color: var(--text-dark); } .analysis-section h3 { color: var(--ocean-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; } .analysis-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; } .analysis-card { background: rgba(240, 244, 248, 0.5); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 20px; text-align: center; } .analysis-card h4 { color: var(--ocean-blue); margin-bottom: 15px; display: flex; align-items: center; gap: 10px; } .distribution-chart { display: flex; flex-direction: column; gap: 10px; } .dist-item { display: flex; justify-content: space-between; align-items: center; } .dist-label { font-size: 0.9rem; color: var(--text-dark); } .dist-value { font-size: 1.2rem; font-weight: bold; color: var(--ocean-blue); } .subject-performance { display: flex; flex-direction: column; gap: 10px; } .subject-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--ocean-light); } .subject-name { font-weight: 600; color: var(--ocean-deep); } .subject-stats { font-size: 0.9rem; color: var(--text-dark); } .recommendations-list { display: flex; flex-direction: column; gap: 15px; } .recommendation-item { background: rgba(240, 244, 248, 0.5); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 15px; text-align: left; } .recommendation-item.critical { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); } .recommendation-item.improvement { border-color: #f39c12; background: rgba(243, 156, 18, 0.1); } .recommendation-item.excellent { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); } .recommendation-item.warning { border-color: #f39c12; background: rgba(243, 156, 18, 0.1); } .rec-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; } .rec-title { font-size: 1.1rem; font-weight: bold; color: var(--ocean-deep); } .rec-description { font-size: 0.9rem; color: var(--text-dark); margin-bottom: 10px; } .rec-actions { display: flex; flex-wrap: wrap; gap: 8px; } .action-tag { background: var(--seafoam); color: white; padding: 5px 10px; border-radius: 15px; font-size: 0.8rem; font-weight: 600; } /* ===== 响应式设计 ===== */ @media (max-width: 768px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } .input-form { grid-template-columns: 1fr; } .grade-table { font-size: 14px; } .grade-table th, .grade-table td { padding: 10px; } } </style>

<body> <!-- 海洋背景 --> <div class="ocean-bg"> <div class="wave"></div> <div class="wave"></div> <div class="wave"></div> </div> <!-- 导航栏 --> <nav class="nav-bar"> <div class="nav-container"> <a href="#" class="nav-brand"> <i class="fas fa-chart-bar"></i> <span>📊 成绩管理</span> </a> <a href="../index-complete.html" class="btn-back"> <i class="fas fa-arrow-left"></i> 返回主页 </a> </div> </nav> <!-- 主内容 --> <div class="main-content"> <div class="page-header"> <h1 class="page-title">📊 成绩管理系统</h1> <p class="page-subtitle">全面的成绩录入、统计和分析功能</p> </div> <!-- 统计卡片 --> <div class="stats-grid"> <div class="stat-card"> <div class="stat-icon">👥</div> <div class="stat-value" id="totalStudents">0</div> <div class="stat-label">学生总数</div> </div> <div class="stat-card"> <div class="stat-icon">📝</div> <div class="stat-value" id="totalGrades">0</div> <div class="stat-label">成绩记录</div> </div> <div class="stat-card"> <div class="stat-icon">📈</div> <div class="stat-value" id="avgScore">0</div> <div class="stat-label">平均分</div> </div> <div class="stat-card"> <div class="stat-icon">🏆</div> <div class="stat-value" id="maxScore">0</div> <div class="stat-label">最高分</div> </div> </div> <!-- 成绩录入区域 --> <div class="grade-input-section"> <h2 class="section-title"> <i class="fas fa-plus-circle"></i> 成绩录入 </h2> <form id="gradeForm" class="input-form"> <div class="form-group"> <label class="form-label">学生姓名</label> <input type="text" class="form-input" id="studentName" placeholder="请输入学生姓名" required> </div> <div class="form-group"> <label class="form-label">学号</label> <input type="text" class="form-input" id="studentId" placeholder="请输入学号" required> </div> <div class="form-group"> <label class="form-label">考试科目</label> <select class="form-input" id="subject" required> <option value="">请选择科目</option> <option value="流体力学基础">流体力学基础</option> <option value="流体力学实验">流体力学实验</option> <option value="计算流体力学">计算流体力学</option> <option value="流体力学综合">流体力学综合</option> </select> </div> <div class="form-group"> <label class="form-label">成绩分数</label> <input type="number" class="form-input" id="gradeScore" placeholder="请输入成绩" min="0" max="150" required> </div> <div class="form-group"> <label class="form-label">考试日期</label> <input type="date" class="form-input" id="examDate" required> </div> <div class="form-group"> <button type="submit" class="btn-add"> <i class="fas fa-plus"></i> 添加成绩 </button> </div> </form> </div> <!-- 成绩列表 --> <div class="grade-list-section"> <h2 class="section-title"> <i class="fas fa-list"></i> 成绩列表 </h2> <div id="gradeList"> <div style="text-align: center; padding: 40px; color: var(--ocean-blue);"> <div style="font-size: 3rem; margin-bottom: 15px;">📊</div> <h3>暂无成绩记录</h3> <p>请先添加一些成绩数据</p> </div> </div> </div> <!-- 图表区域 --> <div class="chart-section"> <h2 class="section-title"> <i class="fas fa-chart-line"></i> 成绩统计图表 </h2> <div class="chart-container"> <div class="chart-placeholder"> <i class="fas fa-chart-bar"></i> <h3>成绩分布图表</h3> <p>当有足够的数据时，这里将显示成绩分布图表</p> </div> </div> </div> <!-- 详细分析 --> <div class="analysis-section" id="detailedAnalysis"> <!-- 内容将由JavaScript填充 --> </div> </div> <!-- 通知容器 --> <div id="notification-container"></div> <script> // 完整的成绩数据 let gradesData = [ { id: 1, subject: '流体静力学基础', score: 85, maxScore: 100, date: '2024-11-15', type: '期中考试', weight: 0.3, category: '流体静力学', difficulty: '基础', feedback: '压强概念掌握良好，浮力计算需要加强' }, { id: 2, subject: '伯努利方程应用', score: 92, maxScore: 100, date: '2024-11-20', type: '作业', weight: 0.2, category: '流体动力学', difficulty: '中级', feedback: '方程推导正确，工程应用理解深入' }, { id: 3, subject: '边界层理论', score: 78, maxScore: 100, date: '2024-11-25', type: '期末考试', weight: 0.5, category: '边界层理论', difficulty: '高级', feedback: '基本概念清晰，分离现象理解需要深化' }, { id: 4, subject: '雷诺数实验', score: 88, maxScore: 100, date: '2024-12-01', type: '实验报告', weight: 0.15, category: '实验分析', difficulty: '中级', feedback: '实验操作规范，数据分析准确' }, { id: 5, subject: '管道流动计算', score: 95, maxScore: 100, date: '2024-12-05', type: '作业', weight: 0.2, category: '管道流动', difficulty: '中级', feedback: '计算过程清晰，结果准确无误' }, { id: 6, subject: '流体力学综合测试', score: 82, maxScore: 100, date: '2024-12-10', type: '综合测试', weight: 0.4, category: '综合应用', difficulty: '高级', feedback: '基础知识扎实，综合应用能力有待提升' } ]; // 显示通知 function showNotification(message, type = 'info', duration = 3000) { const container = document.getElementById('notification-container'); const notification = document.createElement('div'); notification.className = `notification ${type}`; notification.innerHTML = ` <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i> ${message} `; container.appendChild(notification); setTimeout(() => { notification.classList.add('show'); }, 100); if (duration > 0) { setTimeout(() => { notification.classList.remove('show'); setTimeout(() => { if (notification.parentNode) { notification.remove(); } }, 300); }, duration); } } // 更新统计信息 function updateStats() { const totalSubjects = new Set(gradesData.map(grade => grade.subject)).size; const totalGrades = gradesData.length; const avgScore = totalGrades > 0 ? Math.round(gradesData.reduce((sum, grade) => sum + grade.score, 0) / totalGrades) : 0; const maxScore = totalGrades > 0 ? Math.max(...gradesData.map(grade => grade.score)) : 0; document.getElementById('totalStudents').textContent = totalSubjects; document.getElementById('totalGrades').textContent = totalGrades; document.getElementById('avgScore').textContent = avgScore; document.getElementById('maxScore').textContent = maxScore; } // 渲染成绩列表 function renderGradeList() { const gradeList = document.getElementById('gradeList'); if (gradesData.length === 0) { gradeList.innerHTML = ` <div style="text-align: center; padding: 40px; color: var(--ocean-blue);"> <div style="font-size: 3rem; margin-bottom: 15px;">📊</div> <h3>暂无成绩记录</h3> <p>请先添加一些成绩数据</p> </div> `; return; } gradeList.innerHTML = ` <table class="grade-table"> <thead> <tr> <th>科目</th> <th>成绩</th> <th>满分</th> <th>类型</th> <th>日期</th> <th>权重</th> <th>操作</th> </tr> </thead> <tbody> ${gradesData.map((grade, index) => ` <tr> <td>${grade.subject}</td> <td class="grade-score">${grade.score}分</td> <td>${grade.maxScore}分</td> <td>${grade.type}</td> <td>${grade.date}</td> <td>${(grade.weight * 100).toFixed(0)}%</td> <td class="grade-actions"> <button class="btn-edit" onclick="editGrade(${index})"> <i class="fas fa-edit"></i> </button> <button class="btn-delete" onclick="deleteGrade(${index})"> <i class="fas fa-trash"></i> </button> </td> </tr> `).join('')} </tbody> </table> `; } // 添加成绩 function addGrade(gradeData) { // 验证成绩范围 if (gradeData.score < 0 || gradeData.score > 150) { showNotification('成绩必须在0-150分之间', 'error'); return false; } gradesData.push(gradeData); localStorage.setItem('gradesData', JSON.stringify(gradesData)); showNotification(`已添加 ${gradeData.name} 的成绩：${gradeData.score}分`, 'success'); updateStats(); renderGradeList(); generateDetailedAnalysis(); // 添加成绩后重新生成分析 return true; } // 编辑成绩 function editGrade(index) { const grade = gradesData[index]; const newScore = prompt('请输入新的成绩:', grade.score); if (newScore !== null && !isNaN(newScore)) { const score = parseInt(newScore); if (score >= 0 && score <= 150) { gradesData[index].score = score; localStorage.setItem('gradesData', JSON.stringify(gradesData)); showNotification('成绩已更新', 'success'); updateStats(); renderGradeList(); generateDetailedAnalysis(); // 编辑成绩后重新生成分析 } else { showNotification('成绩必须在0-150分之间', 'error'); } } } // 删除成绩 function deleteGrade(index) { if (confirm('确定要删除这条成绩记录吗？')) { const deletedGrade = gradesData.splice(index, 1)[0]; localStorage.setItem('gradesData', JSON.stringify(gradesData)); showNotification(`已删除 ${deletedGrade.name} 的成绩记录`, 'success'); updateStats(); renderGradeList(); generateDetailedAnalysis(); // 删除成绩后重新生成分析 } } // 表单提交处理 document.getElementById('gradeForm').addEventListener('submit', function(e) { e.preventDefault(); const formData = { name: document.getElementById('studentName').value.trim(), studentId: document.getElementById('studentId').value.trim(), subject: document.getElementById('subject').value, score: parseInt(document.getElementById('gradeScore').value), examDate: document.getElementById('examDate').value, timestamp: new Date().toISOString() }; if (addGrade(formData)) { // 清空表单 this.reset(); } }); // 页面初始化 document.addEventListener('DOMContentLoaded', function() { // 从本地存储加载数据 const savedData = localStorage.getItem('gradesData'); if (savedData) { gradesData = JSON.parse(savedData); } // 设置默认日期为今天 document.getElementById('examDate').value = new Date().toISOString().split('T')[0]; updateStats(); renderGradeList(); generateDetailedAnalysis(); showNotification('📊 成绩管理模块已加载', 'success'); }); // 生成详细成绩分析 function generateDetailedAnalysis() { if (gradesData.length === 0) return; const analysis = { totalStudents: gradesData.length, averageScore: calculateAverage(), highestScore: Math.max(...gradesData.map(g => g.score)), lowestScore: Math.min(...gradesData.map(g => g.score)), scoreDistribution: getScoreDistribution(), subjectPerformance: getSubjectPerformance(), trendAnalysis: getTrendAnalysis(), recommendations: generateRecommendations() }; renderDetailedAnalysis(analysis); } // 计算平均分 function calculateAverage() { const total = gradesData.reduce((sum, grade) => sum + grade.score, 0); return (total / gradesData.length).toFixed(1); } // 获取分数分布 function getScoreDistribution() { const distribution = { excellent: 0, // 90-150分 good: 0, // 80-89分 fair: 0, // 70-79分 pass: 0, // 60-69分 fail: 0 // 0-59分 }; gradesData.forEach(grade => { if (grade.score >= 90) distribution.excellent++; else if (grade.score >= 80) distribution.good++; else if (grade.score >= 70) distribution.fair++; else if (grade.score >= 60) distribution.pass++; else distribution.fail++; }); return distribution; } // 获取各科目表现 function getSubjectPerformance() { const subjects = {}; gradesData.forEach(grade => { if (!subjects[grade.subject]) { subjects[grade.subject] = { total: 0, count: 0, scores: [] }; } subjects[grade.subject].total += grade.score; subjects[grade.subject].count++; subjects[grade.subject].scores.push(grade.score); }); // 计算各科目平均分 Object.keys(subjects).forEach(subject => { subjects[subject].average = (subjects[subject].total / subjects[subject].count).toFixed(1); subjects[subject].max = Math.max(...subjects[subject].scores); subjects[subject].min = Math.min(...subjects[subject].scores); }); return subjects; } // 获取趋势分析 function getTrendAnalysis() { const sortedGrades = gradesData.sort((a, b) => new Date(a.timestamp) - new Date(b.timestamp)); const trends = []; for (let i = 0; i < sortedGrades.length - 1; i++) { const current = sortedGrades[i]; const next = sortedGrades[i + 1]; const trend = next.score - current.score; trends.push({ from: current.name, to: next.name, change: trend, percentage: ((trend / current.score) * 100).toFixed(1) }); } return trends; } // 生成学习建议 function generateRecommendations() { const recommendations = []; const average = parseFloat(calculateAverage()); if (average < 60) { recommendations.push({ type: 'critical', title: '需要重点关注', description: '平均分较低，建议加强基础知识的复习和练习', actions: ['增加练习时间', '重点复习基础概念', '寻求教师指导'] }); } else if (average < 80) { recommendations.push({ type: 'improvement', title: '有提升空间', description: '成绩中等，可以通过针对性练习提升成绩', actions: ['分析错题原因', '加强薄弱环节', '多做模拟题'] }); } else { recommendations.push({ type: 'excellent', title: '成绩优秀', description: '继续保持良好的学习状态', actions: ['挑战更高难度', '帮助其他同学', '参与竞赛活动'] }); } // 基于分数分布的建议 const distribution = getScoreDistribution(); if (distribution.fail > 0) { recommendations.push({ type: 'warning', title: '存在不及格情况', description: `${distribution.fail}名学生需要特别关注`, actions: ['一对一辅导', '制定个性化学习计划', '定期检查进度'] }); } return recommendations; } // 渲染详细分析 function renderDetailedAnalysis(analysis) { const container = document.getElementById('detailedAnalysis'); if (!container) return; container.innerHTML = ` <div class="analysis-section"> <h3><i class="fas fa-chart-line"></i> 详细成绩分析</h3> <div class="analysis-grid"> <div class="analysis-card"> <h4>分数分布</h4> <div class="distribution-chart"> <div class="dist-item"> <span class="dist-label">优秀 (90-150)</span> <span class="dist-value">${analysis.scoreDistribution.excellent}人</span> </div> <div class="dist-item"> <span class="dist-label">良好 (80-89)</span> <span class="dist-value">${analysis.scoreDistribution.good}人</span> </div> <div class="dist-item"> <span class="dist-label">中等 (70-79)</span> <span class="dist-value">${analysis.scoreDistribution.fair}人</span> </div> <div class="dist-item"> <span class="dist-label">及格 (60-69)</span> <span class="dist-value">${analysis.scoreDistribution.pass}人</span> </div> <div class="dist-item"> <span class="dist-label">不及格 (0-59)</span> <span class="dist-value">${analysis.scoreDistribution.fail}人</span> </div> </div> </div> <div class="analysis-card"> <h4>各科目表现</h4> <div class="subject-performance"> ${Object.entries(analysis.subjectPerformance).map(([subject, data]) => ` <div class="subject-item"> <div class="subject-name">${subject}</div> <div class="subject-stats"> <span>平均: ${data.average}分</span> <span>最高: ${data.max}分</span> <span>最低: ${data.min}分</span> </div> </div> `).join('')} </div> </div> <div class="analysis-card"> <h4>学习建议</h4> <div class="recommendations-list"> ${analysis.recommendations.map(rec => ` <div class="recommendation-item ${rec.type}"> <div class="rec-header"> <i class="fas ${getRecommendationIcon(rec.type)}"></i> <span class="rec-title">${rec.title}</span> </div> <p class="rec-description">${rec.description}</p> <div class="rec-actions"> ${rec.actions.map(action => `<span class="action-tag">${action}</span>`).join('')} </div> </div> `).join('')} </div> </div> </div> </div> `; } // 获取建议图标 function getRecommendationIcon(type) { const iconMap = { 'critical': 'fa-exclamation-triangle', 'improvement': 'fa-arrow-up', 'excellent': 'fa-star', 'warning': 'fa-exclamation-circle' }; return iconMap[type] || 'fa-lightbulb'; } // 导出成绩报告 function exportGradeReport() { const report = { title: '流体力学成绩报告', date: new Date().toLocaleDateString(), totalStudents: gradesData.length, averageScore: calculateAverage(), grades: gradesData, analysis: { distribution: getScoreDistribution(), subjects: getSubjectPerformance(), recommendations: generateRecommendations() } }; const reportText = `
流体力学成绩报告
生成时间: ${report.date}
总人数: ${report.totalStudents}
平均分: ${report.averageScore} 成绩分布:
优秀(90-150分): ${report.analysis.distribution.excellent}人
良好(80-89分): ${report.analysis.distribution.good}人
中等(70-79分): ${report.analysis.distribution.fair}人
及格(60-69分): ${report.analysis.distribution.pass}人
不及格(0-59分): ${report.analysis.distribution.fail}人 详细成绩:
${gradesData.map(grade => `${grade.name} - ${grade.subject} - ${grade.score}分`).join('\n')} `; const blob = new Blob([reportText], { type: 'text/plain' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = `成绩报告_${new Date().toISOString().split('T')[0]}.txt`; a.click(); URL.revokeObjectURL(url); showNotification('成绩报告已导出', 'success'); } console.log('📊 成绩管理模块已加载'); </script>
</body>
</html>
