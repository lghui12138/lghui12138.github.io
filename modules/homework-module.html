<head> <style data-auth-boot> html[data-auth-pending="1"] body { visibility: hidden !important; opacity: 0 !important; } [v-cloak] { display: none !important; } </style> <script data-auth-boot>document.documentElement.setAttribute('data-auth-pending', '1');</script> <script src="/js/security/auth-guard.js"></script> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"> <meta name="apple-mobile-web-app-capable" content="yes"> <meta name="apple-mobile-web-app-status-bar-style" content="default"> <meta name="format-detection" content="telephone=no"> <title>📝 作业提交 - 流体力学学习平台</title> <!-- Font Awesome - 使用国内CDN --> <link href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"> <style> :root { --ocean-blue: #006994; --ocean-light: #4facfe; --ocean-deep: #003d5b; --coral: #ff6b6b; --seafoam: #00f2fe; --sand: #f4d03f; --bg-ocean: linear-gradient(135deg, #006994 0%, #4facfe 25%, #00f2fe 50%, #006994 75%, #003d5b 100%); --text-light: #ffffff; --text-dark: #2c3e50; } * { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg-ocean); background-size: 400% 400%; animation: ocean-wave 15s ease-in-out infinite; color: var(--text-light); min-height: 100vh; } @keyframes ocean-wave { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } } .ocean-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; } .wave { position: absolute; bottom: 0; left: 0; width: 200%; height: 100px; background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,0V46.29c47.79,22.2,103.59,32.17,158,28,70.36-5.37,136.33-33.31,206.8-37.5C438.64,32.43,512.34,53.67,583,72.05c69.27,18,138.3,24.88,209.4,13.08,36.15-6,69.85-17.84,104.45-29.34C989.49,25,1113-14.29,1200,52.47V0Z" opacity=".25" fill="%2300f2fe"/><path d="M0,0V15.81C13,36.92,27.64,56.86,47.69,72.05,99.41,111.27,165,111,224.58,91.58c31.15-10.15,60.09-26.07,89.67-39.8,40.92-19,84.73-46,130.83-49.67,36.26-2.85,70.9,9.42,98.6,31.56,31.77,25.39,62.32,62,103.63,73,40.44,10.79,81.35-6.69,119.13-24.28s75.16-39,116.92-43.05c59.73-5.85,113.28,22.88,168.9,38.84,30.2,8.66,59,6.17,87.09-7.5,22.43-10.89,48-26.93,60.65-49.24V0Z" opacity=".5" fill="%234facfe"/><path d="M0,0V5.63C149.93,59,314.09,71.32,475.83,42.57c43-7.64,84.23-20.12,127.61-26.46,59-8.63,112.48,12.24,165.56,35.4C827.93,77.22,886,95.24,951.2,90c86.53-7,172.46-45.71,248.8-84.81V0Z" fill="%23006994"/></svg>') repeat-x; animation: wave-move 20s linear infinite; } .wave:nth-child(2) { animation-delay: -5s; opacity: 0.7; } .wave:nth-child(3) { animation-delay: -10s; opacity: 0.5; } @keyframes wave-move { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } } .nav-bar { background: rgba(255, 255, 255, 0.95); border-bottom: 3px solid var(--ocean-light); padding: 15px 0; backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; } .nav-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; } .nav-brand { display: flex; align-items: center; gap: 15px; font-size: 1.5rem; font-weight: bold; color: var(--ocean-blue); text-decoration: none; } .nav-actions { display: flex; align-items: center; gap: 15px; } .btn-back { background: var(--ocean-light); color: white; text-decoration: none; padding: 10px 20px; border-radius: 25px; font-weight: 600; transition: all 0.3s ease; border: 2px solid var(--ocean-light); } .btn-back:hover { background: var(--ocean-blue); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.3); } .main-content { max-width: 1200px; margin: 0 auto; padding: 40px 20px; } .page-header { text-align: center; margin-bottom: 40px; } .page-title { font-size: 2.5rem; color: var(--text-light); margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); } .page-subtitle { font-size: 1.2rem; color: var(--text-light); opacity: 0.9; } .homework-container { background: rgba(255, 255, 255, 0.95); border-radius: 25px; padding: 40px; margin-bottom: 30px; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1); border: 3px solid var(--ocean-light); } .section-title { font-size: 1.8rem; color: var(--ocean-blue); margin-bottom: 25px; display: flex; align-items: center; gap: 15px; } .upload-area { border: 3px dashed var(--ocean-light); border-radius: 20px; padding: 40px; text-align: center; margin-bottom: 30px; transition: all 0.3s ease; background: rgba(79, 172, 254, 0.05); } .upload-area:hover { border-color: var(--coral); background: rgba(255, 107, 107, 0.05); } .upload-area.dragover { border-color: var(--coral); background: rgba(255, 107, 107, 0.1); transform: scale(1.02); } .upload-icon { font-size: 4rem; color: var(--ocean-light); margin-bottom: 20px; } .upload-text { font-size: 1.2rem; color: var(--ocean-blue); margin-bottom: 15px; } .upload-hint { color: #666; font-size: 0.9rem; } .file-input { display: none; } .btn-upload { background: linear-gradient(45deg, var(--ocean-light), var(--seafoam)); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; margin-top: 20px; } .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79, 172, 254, 0.3); } .file-list { margin-top: 30px; } .file-item { background: rgba(240, 244, 248, 0.8); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 20px; margin-bottom: 15px; display: flex; align-items: center; justify-content: space-between; transition: all 0.3s ease; } .file-item:hover { transform: translateX(10px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2); } .file-info { display: flex; align-items: center; gap: 15px; } .file-icon { font-size: 2rem; color: var(--ocean-blue); } .file-details h4 { color: var(--ocean-blue); margin-bottom: 5px; } .file-details p { color: #666; font-size: 0.9rem; } .file-actions { display: flex; gap: 10px; } .btn-action { padding: 8px 15px; border: none; border-radius: 20px; cursor: pointer; font-weight: 600; transition: all 0.3s ease; } .btn-remove { background: var(--coral); color: white; } .btn-remove:hover { background: #e74c3c; transform: scale(1.05); } .homework-form { margin-top: 30px; } .form-group { margin-bottom: 20px; } .form-label { display: block; margin-bottom: 8px; color: var(--ocean-blue); font-weight: 600; } .form-input, .form-textarea, .form-select { width: 100%; padding: 12px 15px; border: 2px solid var(--ocean-light); border-radius: 10px; font-size: 16px; transition: all 0.3s ease; } .form-input:focus, .form-textarea:focus, .form-select:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 15px rgba(255, 107, 107, 0.3); } .form-textarea { resize: vertical; min-height: 100px; } .btn-submit { background: linear-gradient(45deg, var(--coral), #ff8e8e); color: white; border: none; padding: 15px 30px; border-radius: 25px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all 0.3s ease; width: 100%; } .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(255, 107, 107, 0.3); } .submission-history { margin-top: 40px; } .history-item { background: rgba(240, 244, 248, 0.8); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 20px; margin-bottom: 15px; transition: all 0.3s ease; } .history-item:hover { transform: translateX(10px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.2); } .history-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; } .history-title { color: var(--ocean-blue); font-weight: 600; font-size: 1.1rem; } .history-status { padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; font-weight: 600; } .status-pending { background: rgba(255, 193, 7, 0.2); color: #856404; } .status-reviewed { background: rgba(40, 167, 69, 0.2); color: #155724; } .status-late { background: rgba(220, 53, 69, 0.2); color: #721c24; } .history-details { color: #666; font-size: 0.9rem; } .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 10px; color: white; font-weight: 600; z-index: 10000; transform: translateX(400px); transition: transform 0.3s ease; } .notification.show { transform: translateX(0); } .notification.success { background: #28a745; } .notification.error { background: #dc3545; } .notification.warning { background: #ffc107; color: #212529; } .notification.info { background: #17a2b8; } @media (max-width: 768px) { .main-content { padding: 20px 10px; } .homework-container { padding: 20px; } .page-title { font-size: 2rem; } .upload-area { padding: 20px; } .file-item { flex-direction: column; text-align: center; } .file-actions { margin-top: 15px; } } /* ===== 移动端适配 ===== */ @media (max-width: 768px) { .container { padding: 10px; margin: 0; } .page-title { font-size: 1.5rem; margin-bottom: 15px; } .homework-grid { grid-template-columns: 1fr; gap: 15px; } .homework-card { padding: 15px; border-radius: 15px; } .homework-header h3 { font-size: 1.1rem; margin-bottom: 8px; } .homework-meta { font-size: 0.8rem; gap: 8px; } .homework-actions { flex-direction: column; gap: 8px; } .action-btn { padding: 8px 12px; font-size: 0.85rem; } .submit-section { padding: 15px; border-radius: 15px; } .submit-form { grid-template-columns: 1fr; gap: 15px; } .form-group input, .form-group textarea, .form-group select { padding: 10px 12px; font-size: 0.9rem; } .file-upload-area { padding: 20px; border-radius: 12px; } .file-upload-area h3 { font-size: 1.1rem; margin-bottom: 10px; } .file-list { gap: 8px; } .file-item { padding: 10px; border-radius: 8px; } .file-item h4 { font-size: 0.9rem; } .file-item p { font-size: 0.8rem; } .template-section { padding: 15px; border-radius: 15px; } .template-grid { grid-template-columns: 1fr; gap: 10px; } .template-card { padding: 12px; border-radius: 10px; } .template-card h4 { font-size: 1rem; margin-bottom: 6px; } .template-card p { font-size: 0.85rem; line-height: 1.3; } .use-template-btn { padding: 6px 12px; font-size: 0.8rem; } .preview-modal { padding: 10px; } .preview-content { width: 95%; max-width: none; border-radius: 12px; } .preview-header h3 { font-size: 1.1rem; } .preview-body iframe { height: 300px; } } /* ===== Safari浏览器适配 ===== */ @supports (-webkit-appearance: none) { .homework-card { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .action-btn, .submit-btn, .use-template-btn { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .file-upload-area { -webkit-overflow-scrolling: touch; } } /* ===== iOS Safari特殊适配 ===== */ @media screen and (-webkit-min-device-pixel-ratio: 2) { .container { -webkit-text-size-adjust: 100%; } .form-group input, .form-group textarea, .form-group select { font-size: 16px; /* 防止iOS Safari缩放 */ } .action-btn, .submit-btn, .use-template-btn { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; } } /* ===== 触摸设备优化 ===== */ @media (hover: none) and (pointer: coarse) { .homework-card:hover, .action-btn:hover, .submit-btn:hover, .use-template-btn:hover { transform: none; } .homework-card:active, .action-btn:active, .submit-btn:active, .use-template-btn:active { transform: scale(0.95); } } </style>

<body> <!-- 海洋背景 --> <div class="ocean-bg"> <div class="wave"></div> <div class="wave"></div> <div class="wave"></div> </div> <!-- 导航栏 --> <nav class="nav-bar"> <div class="nav-container"> <a href="../index-complete.html" class="nav-brand"> <i class="fas fa-water"></i> <span>📝 作业提交</span> </a> <div class="nav-actions"> <a href="../index-complete.html" class="btn-back"> <i class="fas fa-arrow-left"></i> 返回主页 </a> </div> </div> </nav> <!-- 主内容 --> <div class="main-content"> <div class="page-header"> <h1 class="page-title">📝 作业提交系统</h1> <p class="page-subtitle">在线提交作业，实时跟踪状态，获取教师反馈</p> </div> <!-- 作业提交区域 --> <div class="homework-container"> <h2 class="section-title"> <i class="fas fa-upload"></i> 提交新作业 </h2> <!-- 文件上传区域 --> <div class="upload-area" id="uploadArea"> <div class="upload-icon">📁</div> <div class="upload-text">拖拽文件到此处或点击上传</div> <div class="upload-hint">支持 PDF、Word、图片等格式，最大 50MB</div> <input type="file" id="fileInput" class="file-input" multiple accept=".pdf,.doc,.docx,.jpg,.jpeg,.png,.txt"> <button class="btn-upload" onclick="document.getElementById('fileInput').click()"> <i class="fas fa-cloud-upload-alt"></i> 选择文件 </button> </div> <!-- 文件列表 --> <div class="file-list" id="fileList"> <!-- 文件将在这里显示 --> </div> <!-- 作业信息表单 --> <form class="homework-form" id="homeworkForm"> <div class="form-group"> <label class="form-label">作业标题</label> <input type="text" class="form-input" id="homeworkTitle" placeholder="请输入作业标题" required> </div> <div class="form-group"> <label class="form-label">作业类型</label> <select class="form-select" id="homeworkType" required> <option value="">请选择作业类型</option> <option value="理论作业">理论作业</option> <option value="计算作业">计算作业</option> <option value="实验报告">实验报告</option> <option value="课程设计">课程设计</option> <option value="其他">其他</option> </select> </div> <div class="form-group"> <label class="form-label">课程章节</label> <select class="form-select" id="homeworkChapter" required> <option value="">请选择课程章节</option> <option value="流体静力学">流体静力学</option> <option value="流体动力学">流体动力学</option> <option value="伯努利方程">伯努利方程</option> <option value="粘性流动">粘性流动</option> <option value="边界层理论">边界层理论</option> <option value="管道流动">管道流动</option> <option value="其他">其他</option> </select> </div> <div class="form-group"> <label class="form-label">作业说明</label> <textarea class="form-textarea" id="homeworkDescription" placeholder="请描述作业内容、要求或特殊说明..."></textarea> </div> <button type="submit" class="btn-submit"> <i class="fas fa-paper-plane"></i> 提交作业 </button> </form> </div> <!-- 提交历史 --> <div class="homework-container"> <h2 class="section-title"> <i class="fas fa-history"></i> 提交历史 </h2> <div class="submission-history" id="submissionHistory"> <!-- 提交历史将在这里显示 --> </div> </div> </div> <script> // 全局变量 let selectedFiles = []; let submissionHistory = []; // 页面初始化 document.addEventListener('DOMContentLoaded', () => { loadSubmissionHistory(); setupEventListeners(); }); // 设置事件监听器 function setupEventListeners() { const uploadArea = document.getElementById('uploadArea'); const fileInput = document.getElementById('fileInput'); const homeworkForm = document.getElementById('homeworkForm'); // 文件拖拽上传 uploadArea.addEventListener('dragover', handleDragOver); uploadArea.addEventListener('dragleave', handleDragLeave); uploadArea.addEventListener('drop', handleDrop); // 文件选择 fileInput.addEventListener('change', handleFileSelect); // 表单提交 homeworkForm.addEventListener('submit', handleFormSubmit); } // 处理拖拽悬停 function handleDragOver(e) { e.preventDefault(); document.getElementById('uploadArea').classList.add('dragover'); } // 处理拖拽离开 function handleDragLeave(e) { e.preventDefault(); document.getElementById('uploadArea').classList.remove('dragover'); } // 处理文件拖拽 function handleDrop(e) { e.preventDefault(); document.getElementById('uploadArea').classList.remove('dragover'); const files = Array.from(e.dataTransfer.files); addFiles(files); } // 处理文件选择 function handleFileSelect(e) { const files = Array.from(e.target.files); addFiles(files); } // 添加文件 function addFiles(files) { files.forEach(file => { if (file.size > 50 * 1024 * 1024) { showNotification(`文件 ${file.name} 超过50MB限制`, 'error'); return; } const fileObj = { id: Date.now() + Math.random(), file: file, name: file.name, size: file.size, type: file.type, uploadTime: new Date() }; selectedFiles.push(fileObj); }); renderFileList(); } // 渲染文件列表 function renderFileList() { const fileList = document.getElementById('fileList'); if (selectedFiles.length === 0) { fileList.innerHTML = '<p style="text-align: center; color: #666; margin-top: 20px;">暂无选择文件</p>'; return; } fileList.innerHTML = selectedFiles.map(file => ` <div class="file-item"> <div class="file-info"> <div class="file-icon">${getFileIcon(file.type)}</div> <div class="file-details"> <h4>${file.name}</h4> <p>${formatFileSize(file.size)} • ${file.uploadTime.toLocaleString()}</p> </div> </div> <div class="file-actions"> <button class="btn-action btn-remove" onclick="removeFile('${file.id}')"> <i class="fas fa-trash"></i> 移除 </button> </div> </div> `).join(''); } // 获取文件图标 function getFileIcon(type) { if (type.includes('pdf')) return '📄'; if (type.includes('word') || type.includes('document')) return '📝'; if (type.includes('image')) return '🖼️'; if (type.includes('text')) return '📄'; return '📁'; } // 格式化文件大小 function formatFileSize(bytes) { if (bytes === 0) return '0 Bytes'; const k = 1024; const sizes = ['Bytes', 'KB', 'MB', 'GB']; const i = Math.floor(Math.log(bytes) / Math.log(k)); return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i]; } // 移除文件 function removeFile(fileId) { selectedFiles = selectedFiles.filter(file => file.id !== fileId); renderFileList(); } // 处理表单提交 function handleFormSubmit(e) { e.preventDefault(); if (selectedFiles.length === 0) { showNotification('请至少选择一个文件', 'error'); return; } const formData = { title: document.getElementById('homeworkTitle').value, type: document.getElementById('homeworkType').value, chapter: document.getElementById('homeworkChapter').value, description: document.getElementById('homeworkDescription').value, files: selectedFiles, submitTime: new Date(), status: 'pending', id: Date.now() }; // 模拟提交 submitHomework(formData); } // 提交作业 function submitHomework(formData) { // 显示提交中状态 const submitBtn = document.querySelector('.btn-submit'); const originalText = submitBtn.innerHTML; submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 提交中...'; submitBtn.disabled = true; // 模拟网络延迟 setTimeout(() => { // 添加到提交历史 submissionHistory.unshift(formData); saveSubmissionHistory(); // 清空表单 document.getElementById('homeworkForm').reset(); selectedFiles = []; renderFileList(); // 更新显示 renderSubmissionHistory(); // 恢复按钮状态 submitBtn.innerHTML = originalText; submitBtn.disabled = false; showNotification('作业提交成功！', 'success'); }, 2000); } // 加载提交历史 function loadSubmissionHistory() { const saved = localStorage.getItem('homeworkSubmissions'); if (saved) { try { submissionHistory = JSON.parse(saved); renderSubmissionHistory(); } catch (error) { console.error('加载提交历史失败:', error); } } } // 保存提交历史 function saveSubmissionHistory() { localStorage.setItem('homeworkSubmissions', JSON.stringify(submissionHistory)); } // 渲染提交历史 function renderSubmissionHistory() { const historyContainer = document.getElementById('submissionHistory'); if (submissionHistory.length === 0) { historyContainer.innerHTML = ` <div style="text-align: center; color: #666; padding: 40px;"> <div style="font-size: 3rem; margin-bottom: 20px;">📝</div> <h3>暂无提交记录</h3> <p>提交第一个作业开始您的学习之旅吧！</p> </div> `; return; } historyContainer.innerHTML = submissionHistory.map(submission => ` <div class="history-item"> <div class="history-header"> <div class="history-title">${submission.title}</div> <div class="history-status status-${submission.status}"> ${getStatusText(submission.status)} </div> </div> <div class="history-details"> <p><strong>类型：</strong>${submission.type} | <strong>章节：</strong>${submission.chapter}</p> <p><strong>提交时间：</strong>${submission.submitTime.toLocaleString()}</p> <p><strong>文件数量：</strong>${submission.files.length}个</p> ${submission.description ? `<p><strong>说明：</strong>${submission.description}</p>` : ''} </div> </div> `).join(''); } // 获取状态文本 function getStatusText(status) { switch (status) { case 'pending': return '待批改'; case 'reviewed': return '已批改'; case 'late': return '逾期'; case 'approved': return '已通过'; case 'rejected': return '需修改'; default: return '未知'; } } // 作业模板功能 function loadHomeworkTemplates() { const templates = [ { id: 'template1', title: '流体力学基础作业', type: '理论作业', chapter: '第一章 流体力学基础', description: '完成教材P15-P20的习题1-5，要求手写，拍照上传', deadline: '2024-12-20', points: 20 }, { id: 'template2', title: '伯努利方程应用', type: '计算作业', chapter: '第三章 伯努利方程', description: '完成教材P45-P50的习题1-3，要求详细计算过程', deadline: '2024-12-25', points: 30 }, { id: 'template3', title: '实验报告', type: '实验作业', chapter: '实验一 流体静力学', description: '完成实验报告，包括实验目的、原理、步骤、结果分析', deadline: '2024-12-30', points: 40 } ]; const templateContainer = document.getElementById('homeworkTemplates'); if (templateContainer) { templateContainer.innerHTML = templates.map(template => ` <div class="template-card" onclick="useTemplate('${template.id}')"> <div class="template-header"> <h3>${template.title}</h3> <span class="template-points">${template.points}分</span> </div> <div class="template-info"> <p><strong>类型：</strong>${template.type}</p> <p><strong>章节：</strong>${template.chapter}</p> <p><strong>截止日期：</strong>${template.deadline}</p> <p><strong>要求：</strong>${template.description}</p> </div> <button class="use-template-btn">使用模板</button> </div> `).join(''); } } // 使用作业模板 function useTemplate(templateId) { const templates = { 'template1': { title: '流体力学基础作业', type: '理论作业', chapter: '第一章 流体力学基础', description: '完成教材P15-P20的习题1-5，要求手写，拍照上传' }, 'template2': { title: '伯努利方程应用', type: '计算作业', chapter: '第三章 伯努利方程', description: '完成教材P45-P50的习题1-3，要求详细计算过程' }, 'template3': { title: '实验报告', type: '实验作业', chapter: '实验一 流体静力学', description: '完成实验报告，包括实验目的、原理、步骤、结果分析' } }; const template = templates[templateId]; if (template) { document.getElementById('homeworkTitle').value = template.title; document.getElementById('homeworkType').value = template.type; document.getElementById('homeworkChapter').value = template.chapter; document.getElementById('homeworkDescription').value = template.description; showNotification('已加载作业模板', 'success'); } } // 批量文件上传 function handleBatchUpload(event) { const files = Array.from(event.target.files); files.forEach(file => { if (!selectedFiles.find(f => f.name === file.name)) { selectedFiles.push(file); } }); renderFileList(); showNotification(`已添加 ${files.length} 个文件`, 'success'); } // 文件预览功能 function previewFile(file) { const reader = new FileReader(); reader.onload = function(e) { const modal = document.createElement('div'); modal.className = 'preview-modal'; modal.innerHTML = ` <div class="preview-content"> <div class="preview-header"> <h3>文件预览: ${file.name}</h3> <button onclick="this.closest('.preview-modal').remove()" class="close-btn">&times;</button> </div> <div class="preview-body"> ${file.type.startsWith('image/') ? `<img src="${e.target.result}" style="max-width: 100%; height: auto;">` : `<iframe src="${e.target.result}" style="width: 100%; height: 400px; border: none;"></iframe>` } </div> </div> `; document.body.appendChild(modal); }; reader.readAsDataURL(file); } // 显示通知 function showNotification(message, type = 'info') { const notification = document.createElement('div'); notification.className = `notification ${type}`; notification.textContent = message; document.body.appendChild(notification); setTimeout(() => { notification.classList.add('show'); }, 100); setTimeout(() => { notification.classList.remove('show'); setTimeout(() => { document.body.removeChild(notification); }, 300); }, 3000); } </script>
