); box-shadow: 0 5px 15px rgba(255, 107, 107, 0.3); } /* ===== 上传区域 ===== */ .upload-section { background: rgba(255, 255, 255, 0.95); border: 3px solid var(--ocean-light); border-radius: 20px; padding: 30px; margin-bottom: 40px; color: var(--text-dark); } .upload-tabs { display: flex; gap: 10px; margin-bottom: 30px; background: rgba(240, 244, 248, 0.8); padding: 5px; border-radius: 15px; } .upload-tab { flex: 1; padding: 12px 20px; border: none; background: transparent; color: var(--ocean-blue); font-weight: 600; border-radius: 10px; cursor: pointer; transition: all 0.3s ease; } .upload-tab.active { background: var(--ocean-light); color: white; } .upload-form { display: none; } .upload-form.active { display: block; } .form-group { margin-bottom: 20px; } .form-label { display: block; margin-bottom: 8px; color: var(--ocean-deep); font-weight: 600; } .form-input { width: 100%; padding: 15px; border: 2px solid var(--ocean-light); border-radius: 15px; font-size: 16px; transition: all 0.3s ease; } .form-input:focus { outline: none; border-color: var(--coral); box-shadow: 0 0 20px rgba(255, 107, 107, 0.3); } .btn-upload { background: linear-gradient(45deg, var(--ocean-light), var(--seafoam)); color: white; border: none; padding: 15px 30px; border-radius: 15px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.3s ease; } .btn-upload:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(79, 172, 254, 0.4); } /* ===== 通知系统 ===== */ .notification { position: fixed; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.95); border: 2px solid var(--ocean-light); border-radius: 15px; padding: 20px; color: var(--text-dark); box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2); transform: translateX(100%); transition: transform 0.3s ease; z-index: 1000; max-width: 350px; } .notification.show { transform: translateX(0); } .notification.success { border-color: #27ae60; background: rgba(39, 174, 96, 0.1); } .notification.error { border-color: #e74c3c; background: rgba(231, 76, 60, 0.1); } /* ===== 响应式设计 ===== */ @media (max-width: 768px) { .video-grid { grid-template-columns: 1fr; } .upload-tabs { flex-direction: column; } } /* ===== 移动端适配 ===== */ @media (max-width: 768px) { .container { padding: 10px; margin: 0; } .page-title { font-size: 1.5rem; margin-bottom: 15px; } .video-grid { grid-template-columns: 1fr; gap: 15px; } .video-card { padding: 15px; border-radius: 15px; } .video-thumbnail { height: 200px; border-radius: 12px; } .video-info h3 { font-size: 1.1rem; margin-bottom: 8px; } .video-meta { font-size: 0.8rem; gap: 8px; } .video-actions { flex-direction: column; gap: 8px; } .action-btn { padding: 8px 12px; font-size: 0.85rem; } .upload-section { padding: 15px; border-radius: 15px; } .upload-form { grid-template-columns: 1fr; gap: 15px; } .form-group input, .form-group textarea, .form-group select { padding: 10px 12px; font-size: 0.9rem; } .upload-buttons { flex-direction: column; gap: 10px; } .upload-btn { padding: 12px 20px; font-size: 0.9rem; } .video-player { height: 250px; border-radius: 12px; } .player-controls { padding: 10px; gap: 8px; } .control-btn { padding: 8px 12px; font-size: 0.8rem; } .video-details { padding: 15px; } .video-details h2 { font-size: 1.3rem; margin-bottom: 10px; } .video-description { font-size: 0.9rem; line-height: 1.4; } .video-tags { gap: 6px; margin-top: 10px; } .video-tag { padding: 4px 8px; font-size: 0.75rem; } } /* ===== Safari浏览器适配 ===== */ @supports (-webkit-appearance: none) { .video-card { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .action-btn, .upload-btn, .control-btn { -webkit-appearance: none; -webkit-tap-highlight-color: transparent; } .video-player { -webkit-overflow-scrolling: touch; } } /* ===== iOS Safari特殊适配 ===== */ @media screen and (-webkit-min-device-pixel-ratio: 2) { .container { -webkit-text-size-adjust: 100%; } .form-group input, .form-group textarea, .form-group select { font-size: 16px; /* 防止iOS Safari缩放 */ } .action-btn, .u <body> <!-- 海洋背景 --> <div class="ocean-bg"> <div class="wave"></div> <div class="wave"></div> <div class="wave"></div> </div> <!-- 导航栏 --> <nav class="nav-bar"> <div class="nav-container"> <a href="#" class="nav-brand"> <i class="fas fa-video"></i> <span>🎥 视频课程</span> </a> <a href="../index-complete.html" class="btn-back"> <i class="fas fa-arrow-left"></i> 返回主页 </a> </div> </nav> <!-- 主内容 --> <div class="main-content"> <div class="page-header"> <h1 class="page-title">🎥 视频课程</h1> <p class="page-subtitle">精选流体力学视频，支持本地上传（仅教师）</p> <div id="videoUploadSection" style="display:none; margin-top: 20px; text-align:center;"> <label for="videoUploadInput" class="btn btn-primary" style="cursor:pointer; display:inline-block; font-size:1.1rem; padding:14px 28px; border-radius:18px; background:linear-gradient(45deg,#4facfe,#00f2fe); color:#fff; border:none;"> <i class="fas fa-upload"></i> 上传本地视频（≤50MB） <input type="file" id="videoUploadInput" accept="video/*" style="display:none;" tabindex="0" /> </label> <span id="videoUploadStatus" style="margin-left: 15px; color: #27ae60; display:block; margin-top:10px;"></span> </div> </div> <!-- 上传区域 - 仅教师可见 --> <div class="upload-section" id="uploadSection" style="display: none;"> <h2 style="margin-bottom: 20px; color: var(--ocean-blue);"> <i class="fas fa-cloud-upload-alt"></i> 上传视频 </h2> <div class="upload-tabs"> <button class="upload-tab active" onclick="switchTab('link')">视频链接</button> <button class="upload-tab" onclick="switchTab('bilibili')">B站视频</button> <button class="upload-tab" onclick="switchTab('douyin')">抖音视频</button> </div> <!-- 视频链接上传 --> <div id="link-form" class="upload-form active"> <div class="form-group"> <label class="form-label">视频链接</label> <input type="url" class="form-input" placeholder="请输入视频链接" id="videoLink"> </div> <div class="form-group"> <label class="form-label">视频标题</label> <input type="text" class="form-input" placeholder="请输入视频标题" id="videoTitle"> </div> <div class="form-group"> <label class="form-label">视频 tring(), title: title || `B站视频 ${bvId}`, description: '来自Bilibili的视频内容', duration: 'B站视频', category: 'B站视频', type: 'bilibili', url: `https://www.bilibili.com/video/${bvId}`, thumbnail: '📺' }; videosData.unshift(newVideo); renderVideos(); // 清空表单 document.getElementById('bilibiliBv').value = ''; document.getElementById('bilibiliTitle').value = ''; showNotification('B站视频添加成功！', 'success'); } // 显示理论信息 function showTheoryInfo(videoTitle) { const theoryInfo = { '动量输运、牛顿内摩擦定律、欧拉坐标': { title: '动量输运理论', content: ` <h4>核心概念：</h4> <ul> <li><strong>动量输运：</strong>流体内部动量从高速区域向低速区域的传递过程</li> <li><strong>牛顿内摩擦定律：</strong>τ = μ(∂u/∂y)，描述粘性应力与速度梯度的关系</li> <li><strong>欧拉坐标：</strong>固定在空间中的坐标系，观察流体通过固定点的运动</li> </ul> <h4>应用领域：</h4> <ul> <li>管道流动分析</li> <li>边界层计算</li> <li>湍流建模</li> </ul> ` }, '欧拉、拉格朗日坐标系统': { title: '坐标系统理论', content: ` <h4>两种描述方法：</h4> <ul> <li><strong>欧拉法：</strong>观察固定空间点的流体运动，适合描述流场</li> <li><strong>拉格朗日法：</strong>跟踪特定流体微团的运动轨迹</li> </ul> <h4>重要概念：</h4> <ul> <li><strong>流线：</strong>某时刻速度场的切线，欧拉法概念</li> <li><strong>迹线：</strong>流体微团的实际运动轨迹，拉格朗日法概念</li> </ul> ` }, '流体力学之美，太美了': { title: '流体力学美学', content: ` <h4>自然现象：</h4> <ul> <li>涡旋的形成与演化</li> <li>波浪的传播与干涉</li> <li>湍流的复杂结构</li> </ul> <h4>工程应用：</h4> <ul> <li>飞机机翼设计</li> <li>船舶流体动力学</li> <li>风力发电优化</li> </ul> ` } }; const info = theoryInfo[videoTitle] || { title: '基础理论', content: '<p>该视频涉及流体力学的基础理论知识，建议结合教材深入学习相关概念和原理。</p>' }; const modalHtml = ` <div class="theory-modal" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; display: flex; align-items: center; justify-content: center;"> <div class="theory-content" style="background: white; border-radius: 15px; padding: 30px; max-width: 600px; max-height: 80vh; overflow-y: auto; position: relative;"> <button onclick="this.parentElement.parentElement.remove()" style="position: absolute; top: 15px; right: 20px; background: none; border: none; font-size: 24px; cursor: pointer; color: #666;">×</button> <h3 style="co n(e) { const file = e.target.files[0]; if (!file) return; if (file.size > 50 * 1024 * 1024) { document.getElementById('videoUploadStatus').textContent = '❌ 文件过大，最大50MB'; return; } document.getElementById('videoUploadStatus').textContent = '正在读取文件...'; // 读取文件内容 const arrayBuffer = await file.arrayBuffer(); const base64Content = btoa(String.fromCharCode(...new Uint8Array(arrayBuffer))); // 获取token let token = getGithubToken(); if (!token) token = promptGithubToken(); if (!token) { document.getElementById('videoUploadStatus').textContent = '❌ 未提供GitHub Token'; return; } // 构造API参数 const now = new Date(); const fileName = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${file.name}`; const path = `${GITHUB_VIDEO_DIR}/${fileName}`; const url = `https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`; const body = { message: `上传视频: ${file.name}`, content: base64Content, branch: GITHUB_BRANCH, committer: { name: 'TeacherUploader', email: 'teacher@example.com' } }; document.getElementById('videoUploadStatus').textContent = '正在上传到GitHub...'; // 上传 try { const res = await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(body) }); if (!res.ok) { const err = await res.text(); document.getElementById('videoUploadStatus').textContent = '❌ 上传失败: ' + err; return; } document.getElementById('videoUploadStatus').textContent = '✅ 上传成功！'; // 可选：刷新视频列表，或将新视频加入本地数据 } catch (e) { document.getElementById('videoUploadStatus').textContent = '❌ 上传异常: ' + e.message; } }); } }); // 页面初始化 document.addEventListener('DOMContentLoaded', function() { // 检查用户角色，控制上传区域显示 checkUserRole(); renderVideos(); showNotification('🎥 视频课程模块已加载', 'success'); }); // 检查用户角色 function checkUserRole() { try { const currentUser = JSON.parse(localStorage.getItem('currentUser')); const uploadSection = document.getElementById('uploadSection'); const videoUploadSection = document.getElementById('videoUploadSection'); if (currentUser && currentUser.role === 'teacher') { // 教师端显示上传功能 if (uploadSection) { uploadSection.style.display = 'block'; console.log('教师端：显示上传功能'); } if (videoUploadSection) { videoUploadSection.style.display = 'block'; console.log('教师端：显示本地视频上传功能'); } } else { // 学生端隐藏上传功能 if (uploadSection) { uploadSection.style.display = 'none'; console.log('学生端：隐藏上传功能'); } if (videoUploadSection) { videoUploadSection.style.display = 'none'; console.log('学生端：隐藏本地视频上传功能'); } } } catch (error) { console.error('检查用户角色失败:', error); // 默认隐藏上传功能 const uploadSection = document.getElementById('uploadSection'); if (uploadSection) { uploadSection.style.display = 'none'; } const videoUploadSection = document.getElementById('videoUploadSection'); if (videoUploadSection) { videoUploadSection.style.display = 'none'; } } } console.log('🎥 视频课程模块已加载'); </script>
