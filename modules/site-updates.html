<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>网站更新记录</title>
  <style>
    :root {
      --bg: #f4f7fb;
      --card: #ffffff;
      --line: #dbe6f3;
      --text: #16324f;
      --muted: #5f7893;
      --accent: #2563eb;
      --accent-2: #0f766e;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(180deg, #eef5ff 0%, var(--bg) 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 32px 20px 64px;
    }
    .hero {
      background: linear-gradient(135deg, #1d4ed8, #0f766e);
      color: #fff;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 20px 50px rgba(37, 99, 235, 0.18);
      margin-bottom: 24px;
    }
    .hero h1 { margin: 0 0 10px; font-size: 32px; }
    .hero p { margin: 0; line-height: 1.8; opacity: 0.96; }
    .meta {
      margin-top: 14px;
      font-size: 14px;
      opacity: 0.9;
    }
    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 18px 0 26px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      border: 1px solid transparent;
    }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-secondary { background: #fff; color: var(--accent); border-color: #bfdbfe; }
    .list {
      display: grid;
      gap: 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 20px 22px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.05);
    }
    .tag {
      display: inline-block;
      font-size: 12px;
      font-weight: 800;
      color: var(--accent);
      background: #eaf2ff;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.5;
    }
    .time {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 10px;
    }
    .summary {
      line-height: 1.85;
      color: #27415e;
      white-space: pre-wrap;
    }
    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
    .link-chip {
      text-decoration: none;
      color: var(--accent-2);
      background: #ecfdf5;
      border: 1px solid #bbf7d0;
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 700;
    }
    .muted { color: var(--muted); }
    .empty {
      padding: 28px;
      text-align: center;
      background: #fff;
      border-radius: 18px;
      border: 1px dashed var(--line);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>网站更新记录</h1>
      <p>以后改动统一收在这一个页面里。内容页只保留学习内容和必要入口，不再在每个页面底部堆很长的“本轮更新说明”。</p>
      <div class="meta" id="updatedAt">正在读取最新更新时间…</div>
    </section>

    <div class="toolbar">
      <a class="btn btn-primary" href="./practice-dynamic.html?category=sea-contest">进入海赛练习</a>
      <a class="btn btn-secondary" href="./question-bank.html">题库入口</a>
      <a class="btn btn-secondary" href="./physical-oceanography-home.html">物理海洋学专区</a>
      <a class="btn btn-secondary" href="./fluid-dynamics-dynamic.html">流体动力学页</a>
      <a class="btn btn-secondary" href="../index-complete.html">返回首页</a>
    </div>

    <section class="list" id="updatesList">
      <div class="empty">正在加载更新记录…</div>
    </section>
  </div>

  <script>
    function escapeHtml(text) {
      return String(text ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/\"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function normalizeLink(link) {
      if (typeof link === 'string') {
        const url = link.trim();
        if (!url) return null;
        return { url, label: getLinkLabel(url) };
      }
      if (link && typeof link === 'object' && typeof link.url === 'string' && link.url.trim()) {
        return {
          url: link.url.trim(),
          label: (typeof link.label === 'string' && link.label.trim()) ? link.label.trim() : getLinkLabel(link.url)
        };
      }
      return null;
    }

    function getLinkLabel(url) {
      const normalizedUrl = String(url ?? '').trim();
      const labelMap = {
        '../index-complete.html': '首页',
        '/index-complete.html': '首页',
        'https://lghui.top/index-complete.html': '首页',
        './practice-dynamic.html?category=sea-contest': '海赛总入口',
        '/modules/practice-dynamic.html?category=sea-contest': '海赛总入口',
        'https://lghui.top/modules/practice-dynamic.html?category=sea-contest': '海赛总入口',
        '/modules/practice-dynamic.html?category=fluid-mechanics': '练习页',
        'https://lghui.top/modules/practice-dynamic.html?category=fluid-mechanics': '练习页',
        '/modules/question-bank.html': '题库入口',
        'https://lghui.top/modules/question-bank.html': '题库入口',
        '/modules/real-exams-dynamic.html': '动态真题',
        'https://lghui.top/modules/real-exams-dynamic.html': '动态真题',
        '/modules/real-exams-fixed.html': '固定版真题',
        'https://lghui.top/modules/real-exams-fixed.html': '固定版真题',
        '/modules/knowledge-detail.html': '知识详情',
        'https://lghui.top/modules/knowledge-detail.html': '知识详情',
        '/modules/potential-flow-dynamic.html': '势流专题',
        'https://lghui.top/modules/potential-flow-dynamic.html': '势流专题',
        '/modules/free-surface-dynamic.html': '自由面专题',
        'https://lghui.top/modules/free-surface-dynamic.html': '自由面专题',
        '/modules/viscous-flow-dynamic.html': '粘性流动',
        'https://lghui.top/modules/viscous-flow-dynamic.html': '粘性流动',
        '/modules/fluid-statics-dynamic.html': '流体静力学',
        'https://lghui.top/modules/fluid-statics-dynamic.html': '流体静力学',
        '/modules/fluid-dynamics-dynamic.html': '流体动力学',
        'https://lghui.top/modules/fluid-dynamics-dynamic.html': '流体动力学',
        '/modules/physical-oceanography-home.html': '物理海洋学首页',
        'https://lghui.top/modules/physical-oceanography-home.html': '物理海洋学首页',
        '/modules/physical-oceanography-knowledge.html': '物理海洋学知识页',
        'https://lghui.top/modules/physical-oceanography-knowledge.html': '物理海洋学知识页',
        '/modules/ocean-competition-law-rights-islands.html': '法律·权益·海岛',
        'https://lghui.top/modules/ocean-competition-law-rights-islands.html': '法律·权益·海岛',
        '/modules/ocean-competition-survey-polar-disaster.html': '调查·极地·减灾',
        'https://lghui.top/modules/ocean-competition-survey-polar-disaster.html': '调查·极地·减灾',
        '/modules/ocean-competition-culture-cooperation-environment.html': '文化·合作·环保',
        'https://lghui.top/modules/ocean-competition-culture-cooperation-environment.html': '文化·合作·环保',
        '/modules/ocean-competition-meteorology-ecology-resources.html': '气象·生态·资源',
        'https://lghui.top/modules/ocean-competition-meteorology-ecology-resources.html': '气象·生态·资源',
        '/modules/ocean-competition-physical-chemistry-biology.html': '物理·化学·生物',
        'https://lghui.top/modules/ocean-competition-physical-chemistry-biology.html': '物理·化学·生物',
        '/modules/ocean-competition-geology-current-affairs.html': '地质地理·时事',
        'https://lghui.top/modules/ocean-competition-geology-current-affairs.html': '地质地理·时事',
        '/modules/ocean-competition-marine-technology.html': '海洋科技专题',
        'https://lghui.top/modules/ocean-competition-marine-technology.html': '海洋科技专题',
        '/ultimate-beautiful-formulas.html': '公式总览',
        'https://lghui.top/ultimate-beautiful-formulas.html': '公式总览',
        '/question-banks/index.json': '题库索引 JSON',
        'https://lghui.top/question-banks/index.json': '题库索引 JSON',
        '/site-updates.json': '更新记录 JSON',
        'https://lghui.top/site-updates.json': '更新记录 JSON',
        '/modules/site-updates.html': '站点更新',
        'https://lghui.top/modules/site-updates.html': '站点更新'
      };
      return labelMap[normalizedUrl] || '查看';
    }

    function getTaskLabel(task) {
      const normalizedTask = String(task || '').trim();
      const taskMap = {
        'fluid-mechanics-exam-rebuild-and-site-sync': '流体题库与真题同步',
        'full-site-audit-and-online-verification': '全站巡检与线上验收',
        '网站主线首页入口可读性收口': '首页入口可读性收口',
        '网站主线页面文案收口': '页面文案收口'
      };
      if (taskMap[normalizedTask]) return taskMap[normalizedTask];
      const keywordRules = [
        { keywords: ['网站主线', '更新记录'], label: '更新记录收口' },
        { keywords: ['网站主线', '首页'], label: '首页收口' },
        { keywords: ['网站主线', '巡检'], label: '全站巡检与线上验收' },
        { keywords: ['网站主线'], label: '页面收口' },
        { keywords: ['题库主线'], label: '题库验收' },
        { keywords: ['海赛'], label: '海赛页面更新' },
        { keywords: ['物理海洋学'], label: '物理海洋学更新' },
        { keywords: ['真题'], label: '真题题库修订' },
        { keywords: ['题库'], label: '题库修订' },
        { keywords: ['知识页'], label: '知识页修订' },
        { keywords: ['JSON'], label: '数据校验与同步' }
      ];
      const matchedRule = keywordRules.find(rule => rule.keywords.every(keyword => normalizedTask.includes(keyword)));
      return matchedRule?.label || normalizedTask || '更新';
    }

    function getSortTimestamp(item) {
      const directValue = item?.updatedAt || item?.lastRunAt || '';
      const directTime = Date.parse(directValue);
      if (!Number.isNaN(directTime) && directTime > 0) return directTime;
      const date = String(item?.date || '').trim();
      const time = String(item?.time || '').trim();
      if (date && time) {
        const merged = Date.parse(`${date}T${time}:00+08:00`);
        if (!Number.isNaN(merged) && merged > 0) return merged;
      }
      const timeOnly = Date.parse(time);
      return Number.isNaN(timeOnly) ? 0 : timeOnly;
    }

    async function loadUpdates() {
      const updatedAtEl = document.getElementById('updatedAt');
      const listEl = document.getElementById('updatesList');
      try {
        const res = await fetch(`../site-updates.json?ts=${Date.now()}`, { cache: 'no-store' });
        if (!res.ok) throw new Error('更新记录加载失败');
        const data = await res.json();
        const updates = Array.isArray(data)
          ? data.slice()
          : (Array.isArray(data.updates) ? data.updates.slice() : []);
        updates.sort((left, right) => getSortTimestamp(right) - getSortTimestamp(left));
        const latestItem = updates[0] || null;
        const latestUpdatedAt = Array.isArray(data)
          ? (latestItem?.updatedAt || latestItem?.lastRunAt || (latestItem?.date && latestItem?.time ? `${latestItem.date} ${latestItem.time}` : latestItem?.time) || '')
          : (data.updatedAt || latestItem?.updatedAt || latestItem?.lastRunAt || (latestItem?.date && latestItem?.time ? `${latestItem.date} ${latestItem.time}` : latestItem?.time) || '');
        updatedAtEl.textContent = latestUpdatedAt ? `最后更新：${latestUpdatedAt}` : '最后更新：未知';
        if (!updates.length) {
          listEl.innerHTML = '<div class="empty">暂时还没有可展示的更新记录。</div>';
          return;
        }
        listEl.innerHTML = updates.map(item => {
          const links = Array.isArray(item.links) ? item.links.map(normalizeLink).filter(Boolean).map(link =>
            `<a class="link-chip" href="${escapeHtml(link.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link.label || getLinkLabel(link.url))}</a>`
          ).join('') : '';
          const runTime = item.lastRunTime || item.lastRunAt || '';
          const updateTime = item.time || item.updatedAt || '';
          const timeText = runTime && updateTime && runTime !== updateTime
            ? `最近执行：${runTime}｜内容更新：${updateTime}`
            : (updateTime ? `内容更新：${updateTime}` : (runTime ? `最近执行：${runTime}` : ''));
          return `
            <article class="card">
              <div class="tag">${escapeHtml(getTaskLabel(item.task))}</div>
              <h2>${escapeHtml((item.title || item.id || item.change?.substring(0, 40) || '未命名更新'))}</h2>
              <div class="time">${escapeHtml(timeText)}</div>
              <div class="summary">${escapeHtml((item.summary || item.change || ''))}</div>
              ${links ? `<div class="links">${links}</div>` : ''}
            </article>
          `;
        }).join('');
      } catch (error) {
        updatedAtEl.textContent = '最后更新：读取失败';
        listEl.innerHTML = `<div class="empty">更新记录加载失败：${escapeHtml(error.message)}</div>`;
      }
    }

    loadUpdates();
  </script>
</body>
</html>
